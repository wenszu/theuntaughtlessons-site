<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find your level Speak concisely assessment from The Untaught Lessons." />
  <title>Speak concisely | Find your level</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="shortcut icon" type="image/png" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/apple-touch-icon.png?v=3">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;500;700&display=swap');

    :root {
      --cream: #F3EDE2;
      --navy: #003366;
      --gold: #EEA320;
      --charcoal: #4A4A4A;
      --steel: #4D7094;
      --white: #FFFFFF;
      --line: rgba(0, 51, 102, .14);
      --shadow: 0 18px 44px rgba(0, 51, 102, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Lato', sans-serif;
    }

    body.tsa-speak-locked { overflow: hidden; }

    .tsa-speak-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto auto minmax(220px, 1fr);
      align-items: center;
      column-gap: 20px;
      min-height: 76px;
      padding: 12px 32px;
      background: var(--navy);
      color: var(--white);
    }

    .tsa-speak-logo {
      display: block;
      width: 224px;
      height: 46px;
    }

    .tsa-speak-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .tsa-speak-divider {
      width: 1px;
      height: 38px;
      background: rgba(255, 255, 255, .42);
    }

    .tsa-speak-kicker,
    .tsa-speak-label,
    .tsa-speak-progress,
    .tsa-speak-count,
    .tsa-speak-score-row,
    .tsa-speak-copy-line {
      font-family: 'Roboto Mono', monospace;
    }

    .tsa-speak-kicker {
      display: block;
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .tsa-speak-title {
      display: block;
      margin-top: 3px;
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      font-weight: 700;
      line-height: 1;
    }

    h1, h2, h3 {
      color: var(--navy);
      font-family: 'Playfair Display', serif;
    }

    .tsa-speak-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--cream);
    }

    .tsa-speak-gate.is-hidden { display: none; }

    .tsa-speak-gate-card,
    .tsa-speak-panel,
    .tsa-speak-score-card {
      border: 1px solid var(--line);
      border-top: 4px solid var(--gold);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .tsa-speak-gate-card {
      width: min(100%, 520px);
      padding: 36px;
    }

    .tsa-speak-gate-logo {
      display: block;
      width: 156px;
      height: auto;
      margin: 0 auto 28px;
    }

    .tsa-speak-gate-card h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      text-align: center;
    }

    .tsa-speak-gate-card p {
      margin: 12px 0 28px;
      color: var(--charcoal);
      font-size: 17px;
      line-height: 1.6;
      text-align: center;
    }

    .tsa-speak-form {
      display: grid;
      gap: 12px;
    }

    .tsa-speak-form label,
    .tsa-speak-field-label {
      color: var(--navy);
      font-size: 14px;
      font-weight: 700;
    }

    .tsa-speak-form input,
    .tsa-speak-form select,
    .tsa-speak-textarea,
    .tsa-speak-note-input {
      width: 100%;
      padding: 13px 12px;
      border: 1px solid rgba(0, 51, 102, .22);
      border-radius: 6px;
      color: var(--charcoal);
      background: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      min-height: 50px;
    }

    .tsa-speak-textarea {
      min-height: 230px;
      resize: vertical;
      line-height: 1.55;
    }

    .tsa-speak-prep-notes .tsa-speak-textarea,
    #reflectionNotes .tsa-speak-textarea {
      min-height: 330px;
    }

    .tsa-speak-note-input {
      min-height: 230px;
      resize: vertical;
      line-height: 1.55;
    }

    .tsa-speak-mode-switch {
      display: inline-flex;
      gap: 6px;
      margin: 0 0 18px;
      padding: 6px;
      border: 1px solid rgba(0, 51, 102, .18);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-mode-btn {
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--navy);
      padding: 10px 13px;
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .tsa-speak-mode-btn.is-active {
      background: var(--navy);
      color: var(--white);
    }

    .tsa-speak-time-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 150px));
      gap: 12px;
      margin: 14px 0;
    }

    .tsa-speak-time-grid label {
      display: grid;
      gap: 7px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
    }

    .tsa-speak-time-grid input {
      width: 100%;
      padding: 11px 10px;
      border: 1px solid rgba(0, 51, 102, .22);
      border-radius: 6px;
      color: var(--charcoal);
      font-family: 'Roboto Mono', monospace;
      font-size: 17px;
    }

    .tsa-speak-form input:focus,
    .tsa-speak-form select:focus,
    .tsa-speak-textarea:focus,
    .tsa-speak-note-input:focus {
      border-color: var(--navy);
      outline: 2px solid rgba(238, 163, 32, .26);
    }

    .tsa-speak-button,
    .tsa-speak-submit,
    .tsa-speak-link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 18px;
      border: 1px solid var(--gold);
      border-radius: 6px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }

    .tsa-speak-submit {
      width: 100%;
      margin-top: 10px;
    }

    .tsa-speak-button.secondary,
    .tsa-speak-link-button.secondary {
      border-color: var(--navy);
      background: var(--white);
      color: var(--navy);
    }

    .tsa-speak-link-button.disabled {
      border-color: rgba(0, 51, 102, .22);
      background: #F3F0EA;
      color: rgba(74, 74, 74, .62);
      pointer-events: none;
    }

    .tsa-speak-button[disabled],
    .tsa-speak-submit[disabled] {
      cursor: not-allowed;
      opacity: .58;
    }

    .tsa-speak-error {
      display: none;
      margin: 4px 0 0;
      color: #9F3A38;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .tsa-speak-error.is-visible { display: block; }

    .tsa-speak-main {
      width: min(100%, 1200px);
      margin: 0 auto;
      padding: 54px 24px 80px;
    }

    .tsa-speak-intro {
      margin-bottom: 24px;
    }

    .tsa-speak-label,
    .tsa-speak-progress {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.8px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .tsa-speak-intro h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.05;
    }

    .tsa-speak-intro p {
      max-width: 820px;
      margin: 16px 0 0;
      font-size: 18px;
      line-height: 1.65;
    }

    .tsa-speak-panel { overflow: hidden; }

    .tsa-speak-panel-head {
      padding: 24px 28px;
      border-bottom: 1px solid var(--line);
      background: #FAF8F3;
    }

    .tsa-speak-panel-head h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
    }

    .tsa-speak-panel-head p {
      margin: 12px 0 0;
      font-size: 17px;
      line-height: 1.6;
    }

    .tsa-speak-step {
      padding: 28px;
    }

    .tsa-speak-info {
      margin: 22px 0 0;
      padding: 20px;
      border: 1px solid rgba(0, 51, 102, .12);
      border-radius: 10px;
      background: var(--white);
    }

    .tsa-speak-info h3 {
      margin: 0 0 12px;
      font-size: 25px;
      line-height: 1.15;
    }

    .tsa-speak-info ul {
      margin: 0;
      padding-left: 20px;
    }

    .tsa-speak-info li {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.55;
    }

    .tsa-speak-info li strong {
      color: var(--navy);
    }

    .tsa-speak-prep-grid {
      display: grid;
      grid-template-columns: minmax(280px, .95fr) minmax(560px, 2.05fr);
      gap: 18px;
      align-items: start;
    }

    .tsa-speak-prep-topic,
    .tsa-speak-prep-notes {
      min-height: 100%;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-prep-topic {
      background: #FAF8F3;
    }

    .tsa-speak-prep-topic h3,
    .tsa-speak-prep-notes h3 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.15;
    }

    .tsa-speak-prep-topic p {
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.5;
    }

    .tsa-speak-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .tsa-speak-notes-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .tsa-speak-note-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-note-title {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(0, 51, 102, .22);
      border-radius: 8px;
      color: var(--charcoal);
      font-family: 'Lato', sans-serif;
      font-size: 15px;
    }

    .tsa-speak-record-help {
      margin-bottom: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #FAF8F3;
      overflow: hidden;
    }

    .tsa-speak-record-help summary {
      padding: 15px 18px;
      color: var(--navy);
      font-weight: 700;
      cursor: pointer;
    }

    .tsa-speak-help-body {
      padding: 0 18px 18px;
    }

    .tsa-speak-help-body h3 {
      margin: 10px 0 12px;
      font-size: 24px;
    }

    .tsa-speak-help-body p,
    .tsa-speak-help-body li {
      font-size: 15px;
      line-height: 1.55;
    }

    .tsa-speak-help-steps {
      counter-reset: tsa-speak-step;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0;
      padding: 0;
      list-style: none;
    }

    .tsa-speak-help-steps li {
      counter-increment: tsa-speak-step;
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(0, 51, 102, .12);
      border-radius: 10px;
      background: var(--white);
    }

    .tsa-speak-help-steps li::before {
      content: "Step " counter(tsa-speak-step);
      display: block;
      margin-bottom: 9px;
      color: var(--navy);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .tsa-speak-step-icon {
      display: block;
      width: 64px;
      height: 48px;
      margin: 0 0 10px;
    }

    .tsa-speak-count {
      margin: 8px 0 0;
      color: var(--steel);
      font-size: 12px;
      line-height: 1.4;
      text-align: right;
    }

    .tsa-speak-loading {
      padding: 48px 28px;
      text-align: center;
    }

    .tsa-speak-score-card {
      padding: 34px;
    }

    .tsa-speak-score-card h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.1;
    }

    .tsa-speak-score {
      margin: 18px 0 22px;
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 700;
      line-height: 1;
    }

    .tsa-speak-score-rows {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .tsa-speak-score-row,
    .tsa-speak-feedback-card,
    .tsa-speak-combined {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #FAF8F3;
      color: var(--navy);
      font-size: 13px;
      line-height: 1.5;
    }

    .tsa-speak-score-row strong {
      display: block;
      margin-top: 6px;
      color: var(--gold);
      font-size: 24px;
      line-height: 1;
    }

    .tsa-speak-feedback-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 22px;
    }

    .tsa-speak-feedback-card h3 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    .tsa-speak-feedback-card p {
      margin: 0;
      color: var(--charcoal);
      font-size: 15px;
      line-height: 1.5;
    }

    .tsa-speak-combined {
      margin: 22px 0;
      border-top: 4px solid var(--gold);
      font-size: 15px;
    }

    .tsa-speak-combined h2 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.15;
    }

    @media (max-width: 860px) {
      .tsa-speak-header {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px 20px;
      }

      .tsa-speak-logo {
        width: 172px;
        height: 40px;
      }

      .tsa-speak-divider { display: none; }

      .tsa-speak-notes-grid,
      .tsa-speak-prep-grid,
      .tsa-speak-score-rows,
      .tsa-speak-feedback-grid,
      .tsa-speak-help-steps {
        grid-template-columns: 1fr;
      }

      .tsa-speak-button,
      .tsa-speak-link-button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .tsa-speak-main {
        padding: 36px 14px 60px;
      }

      .tsa-speak-gate-card,
      .tsa-speak-step,
      .tsa-speak-panel-head,
      .tsa-speak-score-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body class="tsa-speak-locked">
  <header class="tsa-speak-header">
    <a class="tsa-speak-logo" href="../../index.html" aria-label="The Untaught Lessons home">
      <img src="../../assets/utl-logo-nav-white.png" alt="The Untaught Lessons" />
    </a>
    <div class="tsa-speak-divider" aria-hidden="true"></div>
    <div>
      <span class="tsa-speak-kicker">Find your level</span>
      <span class="tsa-speak-title" id="headerTitle">Speak concisely</span>
    </div>
  </header>

  <section class="tsa-speak-gate" id="contactGate" aria-labelledby="gateTitle">
    <div class="tsa-speak-gate-card">
      <img class="tsa-speak-gate-logo" src="../../assets/logo.png" alt="The Untaught Lessons" />
      <h1 id="gateTitle">Before we begin</h1>
      <p>Enter your details to get your Find your level and track your progress.</p>
      <form class="tsa-speak-form" id="gateForm">
        <label for="fullName">Full name</label>
        <input id="fullName" name="name" type="text" autocomplete="name" required>

        <label for="emailAddress">Email address</label>
        <input id="emailAddress" name="email" type="email" autocomplete="email" required>

        <label for="roleTitle">Role / Job title</label>
        <select id="roleTitle" name="role" required>
          <option value="" disabled selected>Select your role</option>
          <option value="Student">Student</option>
          <option value="Professional">Professional</option>
          <option value="Manager">Manager</option>
          <option value="Other">Other</option>
        </select>

        <button class="tsa-speak-submit" id="gateSubmit" type="submit">Begin assessment</button>
        <p class="tsa-speak-error" id="gateError" role="alert">Please check your details and try again.</p>
      </form>
    </div>
  </section>

  <main class="tsa-speak-main" id="app" hidden></main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJE--FL2kB_XDNZRnszCtlyLRPvaLAHGuF5TAOdXJk40atbvf5Y6ELuSK2B7CSLaMN/exec';
    const GATE_KEY = 'tsa_gate_complete';
    const CONTACT_SESSION_KEY = 'utl_contact_shared';
    const CONTACT_PROFILE_KEY = 'utl_contact_profile';
    const SPEAK_SCORE_KEY = 'tsa_speak_score';
    const DATA_URL = '../../data/tsa/speak-concisely.json';
    const isCheckpoint = new URLSearchParams(window.location.search).get('version') === 'checkpoint';
    const versionLabel = isCheckpoint ? 'Checkpoint' : 'Diagnostic';
    document.getElementById('headerTitle').textContent = isCheckpoint ? 'Speak concisely: Checkpoint' : 'Speak concisely';

    const SCORER_SYSTEM_PROMPT = `You are a scoring assistant for the Find your level assessment by The Untaught Lessons.

You are scoring a Phase 2 Speak concisely submission — a participant's spoken transcript delivered under a time limit.

Score the following criteria using the C³ Rubric™. Each criterion is scored 1 to 5. Assign whole numbers only.

C1 — Clear Core Idea: 1=none/scattered, 2=vague, 3=generally understood, 4=clear and focused, 5=precise and memorable.
C4 — Decision Clarity: 1=none, 2=implied/vague, 3=present but weak, 4=clear and specific, 5=decisive and compelling.
C5 — Controlled Pacing: 1=no control, 2=inconsistent, 3=generally understandable, 4=mostly intentional, 5=every beat serves the message.
C6 — Vocal Clarity: 1=unclear, 2=inconsistent, 3=functional, 4=clear, 5=crisp and effortless.
C7 — Commanding Presence: 1=weak/hesitant, 2=uneven, 3=adequate, 4=confident and credible, 5=authoritative and compelling.
C8 — Concise Execution: 1=bloated, 2=loose, 3=acceptable, 4=tight, 5=razor sharp.

Return only JSON with C1, C4, C5, C6, C7, C8, msg1, msg2, msg3, feedback, and compression fields when needed.`;

    let topics = [];
    let setIndex = 0;
    let currentTopic = null;

    const app = document.getElementById('app');
    const contactGate = document.getElementById('contactGate');
    const gateForm = document.getElementById('gateForm');
    const gateSubmit = document.getElementById('gateSubmit');
    const gateError = document.getElementById('gateError');
    const state = {
      participant: { name: '', email: '' },
      notesMode: 'open',
      reflectionMode: 'open',
      transcript: '',
      transcriptA: '',
      transcriptB: '',
      durations: {}
    };

    function readContactProfile() {
      if (sessionStorage.getItem(CONTACT_SESSION_KEY) !== 'true') return null;
      try {
        const profile = JSON.parse(sessionStorage.getItem(CONTACT_PROFILE_KEY) || '{}');
        return profile.name && profile.email ? profile : null;
      } catch (error) {
        return null;
      }
    }

    function rememberContact(payload) {
      sessionStorage.setItem(CONTACT_SESSION_KEY, 'true');
      sessionStorage.setItem(CONTACT_PROFILE_KEY, JSON.stringify({
        name: payload.name || '',
        email: payload.email || '',
        role: payload.role || '',
        message: payload.message || '',
        source: payload.source || 'tsa-assessment'
      }));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function wordCount(text) {
      return (text.trim().match(/\b[\w'-]+\b/g) || []).length;
    }

    function renderLoadingState() {
      app.hidden = false;
      app.innerHTML = `
        <section class="tsa-speak-panel">
          <div class="tsa-speak-panel-head">
            <h2>Loading assessment...</h2>
          </div>
          <div class="tsa-speak-panel-body">
            <p>Preparing the Speak concisely exercise.</p>
          </div>
        </section>
      `;
    }

    function renderDataError() {
      contactGate.classList.add('is-hidden');
      document.body.classList.remove('tsa-speak-locked');
      app.hidden = false;
      app.innerHTML = `
        <section class="tsa-speak-panel">
          <div class="tsa-speak-panel-head">
            <h2>We could not load this assessment.</h2>
          </div>
          <div class="tsa-speak-panel-body">
            <p>Please refresh the page. If the issue continues, the exercise data file may be missing or malformed.</p>
          </div>
        </section>
      `;
    }

    // Exercise data is loaded from ../../data/tsa/speak-concisely.json.
    // Add new Speak concisely topics in that JSON file, not in this HTML.
    // Expected schema: an array of topic objects with title, scenario, points,
    // keyMessages, tags, difficulty, and optional timeLimitSeconds metadata.
    async function loadExerciseData() {
      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error(`Unable to load ${DATA_URL}`);
      const data = await response.json();
      if (!Array.isArray(data) || !data.length) throw new Error('Speak concisely data is empty.');
      topics = data;
      setIndex = Math.floor(Math.random() * topics.length);
      currentTopic = topics[setIndex];
    }

    function startAssessment() {
      if (!currentTopic) {
        renderLoadingState();
        return;
      }
      contactGate.classList.add('is-hidden');
      document.body.classList.remove('tsa-speak-locked');
      app.hidden = false;
      renderTopicCard();
    }

    gateForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      gateError.classList.remove('is-visible');
      if (!gateForm.checkValidity()) {
        gateForm.reportValidity();
        return;
      }

      const formData = new FormData(gateForm);
      state.participant.name = formData.get('name').trim();
      state.participant.email = formData.get('email').trim();
      const payload = {
        name: state.participant.name,
        email: state.participant.email,
        role: formData.get('role').trim(),
        message: 'Submitted via Diagnostic — Phase 2 Speak concisely',
        page: window.location.href,
        source: 'tsa-assessment'
      };

      gateSubmit.disabled = true;
      gateSubmit.textContent = 'Starting...';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.warn('Lead capture failed, continuing assessment locally.', error);
      } finally {
        sessionStorage.setItem(GATE_KEY, 'true');
        sessionStorage.setItem('tsa_participant_name', state.participant.name);
        sessionStorage.setItem('tsa_participant_email', state.participant.email);
        rememberContact(payload);
        startAssessment();
      }
    });

    async function initializeApp() {
      const contactProfile = readContactProfile();
      const gateComplete = sessionStorage.getItem(GATE_KEY) === 'true' || Boolean(contactProfile);
      if (gateComplete) renderLoadingState();
      try {
        await loadExerciseData();
        if (gateComplete) {
          state.participant.name = sessionStorage.getItem('tsa_participant_name') || contactProfile?.name || '';
          state.participant.email = sessionStorage.getItem('tsa_participant_email') || contactProfile?.email || '';
          sessionStorage.setItem(GATE_KEY, 'true');
          sessionStorage.setItem('tsa_participant_name', state.participant.name);
          sessionStorage.setItem('tsa_participant_email', state.participant.email);
          startAssessment();
        }
      } catch (error) {
        console.error(error);
        renderDataError();
      }
    }

    function localScoreTranscript(transcript, transcriptB = '') {
      const scoringText = transcriptB || transcript;
      const lower = scoringText.toLowerCase();
      const words = wordCount(scoringText);
      const msgScores = currentTopic.keyMessages.map(message => {
        const tokens = message.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(word => word.length > 4);
        const hits = tokens.filter(token => lower.includes(token)).length;
        if (hits >= Math.max(2, Math.ceil(tokens.length * .3))) return 4;
        if (hits >= 1) return 2;
        return 0;
      });
      const hasConclusion = /\b(recommend|should|next|therefore|ask|approve|decide|need)\b/i.test(scoringText);
      const sentenceCount = Math.max(1, (scoringText.match(/[.!?]/g) || []).length);
      const avgWords = words / sentenceCount;
      const C1 = Math.min(5, Math.max(2, Math.round((msgScores.reduce((a, b) => a + b, 0) / 12) * 4) + 1));
      const C4 = hasConclusion ? 4 : 2;
      const C5 = avgWords <= 24 ? 4 : 3;
      const C6 = avgWords <= 28 ? 4 : 3;
      const C7 = hasConclusion ? 4 : 3;
      const C8 = words <= 140 ? 4 : words <= 195 ? 3 : 2;
      const compression = transcriptB ? Math.max(1, Math.min(5, Math.round((wordCount(transcript) ? (wordCount(transcriptB) / wordCount(transcript)) : .7) <= .75 ? 4 : 3))) : 0;
      return {
        C1, C4, C5, C6, C7, C8,
        msg1: msgScores[0],
        msg2: msgScores[1],
        msg3: msgScores[2],
        compression,
        compression_feedback: transcriptB ? 'The concise version kept the main structure, but the final quality depends on whether the key messages stayed explicit.' : '',
        feedback: {
          C1: 'The core idea is understandable when the main takeaway appears early and stays consistent.',
          C4: hasConclusion ? 'The transcript includes a clear recommendation or next step.' : 'The transcript would be stronger with a more explicit recommendation or next step.',
          C5: 'The pacing appears manageable based on transcript length and sentence structure.',
          C6: 'The wording is generally clear enough to follow.',
          C7: hasConclusion ? 'The language projects conviction because it takes a position.' : 'The delivery would feel more confident with more decisive wording.',
          C8: words <= 140 ? 'The transcript is concise for the target time.' : 'The transcript may need tighter editing to fit the target time.',
          overall: 'This automated local score is a placeholder until a secure scoring endpoint is connected. Use it as directional feedback, not a final human-grade assessment.'
        }
      };
    }

    async function scoreWithClaude() {
      const transcript = isCheckpoint ? state.transcriptA : state.transcript;
      const checkpointInstruction = isCheckpoint ? ' This is a Checkpoint submission with two recordings. Include compression and compression_feedback in the JSON.' : '';
      const content = isCheckpoint
        ? `Exercise: Phase 2 Speak concisely — Checkpoint\nTopic: ${currentTopic.title}\nKey messages to score against:\n1. ${currentTopic.keyMessages[0]}\n2. ${currentTopic.keyMessages[1]}\n3. ${currentTopic.keyMessages[2]}\n\nRecording A transcript (target: 2 minutes):\n${state.transcriptA}\n\nRecording B transcript (target: 1 minute):\n${state.transcriptB}`
        : `Exercise: Phase 2 Speak concisely — Diagnostic\nTopic: ${currentTopic.title}\nKey messages to score against:\n1. ${currentTopic.keyMessages[0]}\n2. ${currentTopic.keyMessages[1]}\n3. ${currentTopic.keyMessages[2]}\n\nTranscript:\n${transcript}`;

      if (!window.TSA_SPEAK_SCORER_ENDPOINT) {
        return localScoreTranscript(transcript, isCheckpoint ? state.transcriptB : '');
      }

      const response = await fetch(window.TSA_SPEAK_SCORER_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SCORER_SYSTEM_PROMPT + checkpointInstruction,
          messages: [{ role: 'user', content }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || data.text || JSON.stringify(data);
      return JSON.parse(text);
    }

    function applyTimingPenalties(parts) {
      if (!isCheckpoint) {
        const words = wordCount(state.transcript);
        const seconds = state.durations.diagnosticTranscript || 0;
        if ((seconds && seconds < 30) || (!seconds && words < 50)) parts.coverage = Math.max(0, parts.coverage - 4);
        if ((seconds && seconds > 75) || (!seconds && words > 140)) parts.delivery = Math.max(0, parts.delivery - 3);
        return parts;
      }
      const wordsA = wordCount(state.transcriptA);
      const wordsB = wordCount(state.transcriptB);
      const secondsA = state.durations.transcriptA || 0;
      const secondsB = state.durations.transcriptB || 0;
      if ((secondsA && secondsA < 45) || (!secondsA && wordsA < 100)) parts.coverage = Math.max(0, parts.coverage - 8);
      else if ((secondsA && secondsA < 90) || (!secondsA && wordsA < 195)) parts.coverage = Math.max(0, parts.coverage - 4);
      else if ((secondsA && secondsA > 180) || (!secondsA && wordsA > 390)) parts.delivery = Math.max(0, parts.delivery - 4);
      else if ((secondsA && secondsA > 150) || (!secondsA && wordsA > 325)) parts.delivery = Math.max(0, parts.delivery - 2);
      if ((secondsB && secondsB < 30) || (!secondsB && wordsB < 50)) parts.conciseness = Math.max(0, parts.conciseness - 6);
      else if ((secondsB && secondsB > 120) || (!secondsB && wordsB > 260)) parts.conciseness = Math.max(0, parts.conciseness - 6);
      else if ((secondsB && secondsB > 90) || (!secondsB && wordsB > 195)) parts.conciseness = Math.max(0, parts.conciseness - 3);
      return parts;
    }

    function calculateParts(raw) {
      const coverage = Number(raw.msg1 || 0) + Number(raw.msg2 || 0) + Number(raw.msg3 || 0);
      const delivery = Math.round(((Number(raw.C5 || 0) + Number(raw.C6 || 0) + Number(raw.C7 || 0)) / 15) * 9);
      const conciseness = isCheckpoint
        ? Math.round((Number(raw.compression || 0) / 5) * 9)
        : Math.round((Number(raw.C8 || 0) / 5) * 9);
      return applyTimingPenalties({ coverage, delivery, conciseness });
    }

    function interpretation(total) {
      if (total >= 27) return 'Exceptional: your message was clear, tight, and compelling.';
      if (total >= 21) return 'Strong: good coverage and delivery with room to sharpen.';
      if (total >= 13) return 'Developing: the message was there but needs more focus and conciseness.';
      return 'Early stage: this is exactly what the UTL Speak concisely phase builds.';
    }

    function readScore(key) {
      try {
        const raw = sessionStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    async function scoreSubmission() {
      renderShell(`
        <section class="tsa-speak-panel">
          <div class="tsa-speak-loading">
            <p class="tsa-speak-label">Scoring</p>
            <h2>Scoring your transcript...</h2>
            <p>This may take a moment.</p>
          </div>
        </section>
      `);

      let raw;
      try {
        raw = await scoreWithClaude();
      } catch (error) {
        raw = localScoreTranscript(isCheckpoint ? state.transcriptA : state.transcript, isCheckpoint ? state.transcriptB : '');
      }
      const parts = calculateParts(raw);
      const total = Math.min(30, parts.coverage + parts.delivery + parts.conciseness);
      const result = {
        score: total,
        coverage: parts.coverage,
        delivery: parts.delivery,
        conciseness: parts.conciseness,
        topic: currentTopic.title,
        version: versionLabel,
        raw
      };
      sessionStorage.setItem(SPEAK_SCORE_KEY, JSON.stringify(result));
      localStorage.setItem(SPEAK_SCORE_KEY, JSON.stringify(result));
      import('../../assets/firebase.js')
        .then(({ saveUserProgress }) => saveUserProgress(SPEAK_SCORE_KEY, `Speak concisely (${versionLabel})`, result))
        .catch((error) => console.warn('Firestore progress save failed.', error));
      showScore(result);
    }

    function criterionCard(title, value, feedback) {
      return `
        <div class="tsa-speak-feedback-card">
          <h3>${escapeHtml(title)} · ${Number(value || 0)}/5</h3>
          <p>${escapeHtml(feedback || 'Feedback unavailable.')}</p>
        </div>
      `;
    }

    function showScore(result) {
      const sort = readScore('tsa_sort_score');
      const spot = readScore('tsa_spot_score');
      const combined = sort && spot ? Number(sort.score) + Number(spot.score) : null;
      const running = combined !== null ? combined + result.score : null;
      const combinedMarkup = combined !== null ? `
        <div class="tsa-speak-combined">
          <h2>Checking your response</h2>
          <div>Part 1: Think clearly: ${combined} / 40</div>
          <div>Part 2: Speak concisely: ${result.score} / 30</div>
          <div><strong>Running total: ${running} / 70</strong></div>
        </div>
      ` : '';

      renderShell(`
        <section class="tsa-speak-score-card">
          <h1>Your Speak concisely score</h1>
          <div class="tsa-speak-score">${result.score} / 30</div>
          <div class="tsa-speak-score-rows">
            <div class="tsa-speak-score-row">Message coverage<strong>${result.coverage} / 12</strong></div>
            <div class="tsa-speak-score-row">Delivery quality<strong>${result.delivery} / 9</strong></div>
            <div class="tsa-speak-score-row">${isCheckpoint ? 'Compression' : 'Conciseness'}<strong>${result.conciseness} / 9</strong></div>
          </div>
          <p>${interpretation(result.score)}</p>
          ${combinedMarkup}
          <p class="tsa-speak-label">Criterion feedback</p>
          <div class="tsa-speak-feedback-grid">
            ${criterionCard('Clear Core Idea', result.raw.C1, result.raw.feedback?.C1)}
            ${criterionCard('Decision Clarity', result.raw.C4, result.raw.feedback?.C4)}
            ${criterionCard('Controlled Pacing', result.raw.C5, result.raw.feedback?.C5)}
            ${criterionCard('Vocal Clarity', result.raw.C6, result.raw.feedback?.C6)}
            ${criterionCard('Commanding Presence', result.raw.C7, result.raw.feedback?.C7)}
            ${criterionCard('Concise Execution', result.raw.C8, result.raw.feedback?.C8)}
          </div>
          ${isCheckpoint ? `<p><strong>Compression:</strong> ${Number(result.raw.compression || 0)}/5. ${escapeHtml(result.raw.compression_feedback || '')}</p>` : ''}
          <p><strong>Overall:</strong> ${escapeHtml(result.raw.feedback?.overall || '')}</p>
          <p class="tsa-speak-copy-line" id="copyLine" hidden>Speak concisely\t${result.score}/30\tCoverage: ${result.coverage}/12\tDelivery: ${result.delivery}/9\t${isCheckpoint ? 'Compression' : 'Conciseness'}: ${result.conciseness}/9\tTopic: ${currentTopic.title}\tVersion: ${versionLabel}</p>
          <div class="tsa-speak-actions">
            <button class="tsa-speak-button secondary" id="copyResults" type="button">Copy results</button>
            <a class="tsa-speak-link-button secondary" href="${isCheckpoint ? '../tsa-checkpoint/index.html' : '../tsa-diagnostic/index.html'}">← Back to ${isCheckpoint ? 'Checkpoint' : 'Diagnostic'}</a>
            <a class="tsa-speak-link-button disabled" href="#" title="Coming soon">Continue to Act confidently →</a>
          </div>
        </section>
      `);

      document.getElementById('copyResults').addEventListener('click', async event => {
        await navigator.clipboard.writeText(document.getElementById('copyLine').textContent);
        event.target.textContent = 'Copied';
      });
    }

    initializeApp();
  </script>
  <script type="module" src="../../assets/feedback-widget.js?v=4"></script>
</body>
</html>
