<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Practice compressing your Aiko explanation into 60 seconds." />
  <title>Explain to Aiko (60s) | The Untaught Lessons</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="shortcut icon" type="image/png" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/apple-touch-icon.png?v=3">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;500;700&display=swap');

    :root {
      --cream: #F3EDE2;
      --navy: #003366;
      --gold: #EEA320;
      --charcoal: #4A4A4A;
      --steel: #4D7094;
      --white: #FFFFFF;
      --line: rgba(0, 51, 102, .14);
      --shadow: 0 18px 44px rgba(0, 51, 102, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Lato', sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .tsa-speak-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto auto minmax(220px, 1fr);
      align-items: center;
      column-gap: 20px;
      min-height: 76px;
      padding: 12px 32px;
      background: var(--navy);
      color: var(--white);
    }

    .tsa-speak-logo {
      display: block;
      width: 224px;
      height: 46px;
    }

    .tsa-speak-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .tsa-speak-divider {
      width: 1px;
      height: 38px;
      background: rgba(255, 255, 255, .42);
    }

    .tsa-speak-kicker,
    .tsa-speak-label,
    .tsa-speak-progress,
    .tsa-speak-count,
    .explain-aiko-target {
      font-family: 'Roboto Mono', monospace;
    }

    .tsa-speak-kicker {
      display: block;
      color: var(--gold);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .tsa-speak-title {
      display: block;
      margin-top: 3px;
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      font-weight: 700;
      line-height: 1;
    }

    .module-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 9px;
      color: rgba(255, 255, 255, .82);
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .module-back-link:hover {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    h1,
    h2,
    h3 {
      color: var(--navy);
      font-family: 'Playfair Display', serif;
    }

    .tsa-speak-main {
      width: min(100%, 1200px);
      margin: 0 auto;
      padding: 54px 24px 80px;
    }

    .tsa-speak-intro {
      margin-bottom: 24px;
    }

    .tsa-speak-label,
    .tsa-speak-progress {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.8px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .tsa-speak-intro h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.05;
    }

    .tsa-speak-intro p {
      max-width: 820px;
      margin: 16px 0 0;
      font-size: 18px;
      line-height: 1.65;
    }

    .tsa-speak-panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-top: 4px solid var(--gold);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .tsa-speak-panel-head {
      padding: 24px 28px;
      border-bottom: 1px solid var(--line);
      background: #FAF8F3;
    }

    .tsa-speak-panel-head h2 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
    }

    .tsa-speak-panel-head p {
      margin: 12px 0 0;
      font-size: 17px;
      line-height: 1.6;
    }

    .tsa-speak-step {
      padding: 28px;
    }

    .explain-aiko-target {
      display: inline-flex;
      margin-top: 14px;
      padding: 7px 10px;
      border: 1px solid rgba(238, 163, 32, .45);
      border-radius: 999px;
      background: rgba(238, 163, 32, .12);
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .tsa-speak-info {
      margin: 22px 0 0;
      padding: 20px;
      border: 1px solid rgba(0, 51, 102, .12);
      border-radius: 10px;
      background: var(--white);
    }

    .tsa-speak-info h3 {
      margin: 0 0 12px;
      font-size: 25px;
      line-height: 1.15;
    }

    .tsa-speak-info ul {
      margin: 0;
      padding-left: 20px;
    }

    .tsa-speak-info li {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.55;
    }

    .tsa-speak-info li strong {
      color: var(--navy);
    }

    .tsa-speak-prep-grid {
      display: grid;
      grid-template-columns: minmax(300px, .95fr) minmax(520px, 1.65fr);
      gap: 18px;
      align-items: start;
    }

    .tsa-speak-prep-topic,
    .tsa-speak-prep-notes {
      min-height: 100%;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-prep-topic {
      background: #FAF8F3;
    }

    .tsa-speak-prep-topic h3,
    .tsa-speak-prep-notes h3 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.15;
    }

    .tsa-speak-prep-topic p {
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.58;
    }

    .explain-aiko-email {
      white-space: pre-line;
    }

    .tsa-speak-textarea,
    .tsa-speak-note-input,
    .tsa-speak-note-title,
    .tsa-speak-time-grid input {
      width: 100%;
      padding: 13px 12px;
      border: 1px solid rgba(0, 51, 102, .22);
      border-radius: 6px;
      color: var(--charcoal);
      background: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      min-height: 50px;
    }

    .tsa-speak-textarea {
      min-height: 230px;
      resize: vertical;
      line-height: 1.55;
    }

    .tsa-speak-prep-notes .tsa-speak-textarea {
      min-height: 360px;
    }

    .tsa-speak-note-input {
      min-height: 230px;
      resize: vertical;
      line-height: 1.55;
    }

    .tsa-speak-mode-switch {
      display: inline-flex;
      gap: 6px;
      margin: 0 0 18px;
      padding: 6px;
      border: 1px solid rgba(0, 51, 102, .18);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-mode-btn {
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--navy);
      padding: 10px 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .tsa-speak-mode-btn.is-active {
      background: var(--navy);
      color: var(--white);
    }

    .tsa-speak-notes-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .tsa-speak-note-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
    }

    .tsa-speak-field-label {
      color: var(--navy);
      font-size: 14px;
      font-weight: 700;
    }

    .tsa-speak-record-help {
      margin-bottom: 20px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #FAF8F3;
      overflow: hidden;
    }

    .tsa-speak-record-help summary {
      padding: 15px 18px;
      color: var(--navy);
      font-weight: 700;
      cursor: pointer;
    }

    .tsa-speak-help-body {
      padding: 0 18px 18px;
    }

    .tsa-speak-help-body h3 {
      margin: 10px 0 12px;
      font-size: 24px;
    }

    .tsa-speak-help-body p,
    .tsa-speak-help-body li {
      font-size: 15px;
      line-height: 1.55;
    }

    .tsa-speak-help-steps {
      counter-reset: tsa-speak-step;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0;
      padding: 0;
      list-style: none;
    }

    .tsa-speak-help-steps li {
      counter-increment: tsa-speak-step;
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(0, 51, 102, .12);
      border-radius: 10px;
      background: var(--white);
    }

    .tsa-speak-help-steps li::before {
      content: "Step " counter(tsa-speak-step);
      display: block;
      margin-bottom: 9px;
      color: var(--navy);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .tsa-speak-step-icon {
      display: block;
      width: 64px;
      height: 48px;
      margin: 0 0 10px;
    }

    .tsa-speak-time-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 150px));
      gap: 12px;
      margin: 14px 0;
    }

    .tsa-speak-time-grid label {
      display: grid;
      gap: 7px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
    }

    .tsa-speak-time-grid input {
      font-family: 'Roboto Mono', monospace;
      font-size: 17px;
    }

    .tsa-speak-count {
      margin: 8px 0 0;
      color: var(--steel);
      font-size: 12px;
      line-height: 1.4;
      text-align: right;
    }

    .tsa-speak-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .tsa-speak-button,
    .tsa-speak-link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 18px;
      border: 1px solid var(--gold);
      border-radius: 6px;
      background: var(--gold);
      color: var(--navy);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }

    .tsa-speak-button.secondary,
    .tsa-speak-link-button.secondary {
      border-color: var(--navy);
      background: var(--white);
      color: var(--navy);
    }

    .tsa-speak-button[disabled] {
      cursor: not-allowed;
      opacity: .58;
    }

    .explain-aiko-submit-status {
      min-height: 20px;
      margin: 12px 0 0;
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-align: right;
      text-transform: uppercase;
    }

    @media (max-width: 860px) {
      .tsa-speak-header {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px 20px;
      }

      .tsa-speak-logo {
        width: 172px;
        height: 40px;
      }

      .tsa-speak-divider {
        display: none;
      }

      .tsa-speak-prep-grid,
      .tsa-speak-notes-grid,
      .tsa-speak-help-steps {
        grid-template-columns: 1fr;
      }

      .tsa-speak-button,
      .tsa-speak-link-button {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .tsa-speak-main {
        padding: 36px 14px 60px;
      }

      .tsa-speak-step,
      .tsa-speak-panel-head {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="tsa-speak-header">
    <a class="tsa-speak-logo" href="../../index.html" aria-label="The Untaught Lessons home">
      <img src="../../assets/utl-logo-nav-white.png" alt="The Untaught Lessons" />
    </a>
    <div class="tsa-speak-divider" aria-hidden="true"></div>
    <div>
      <span class="tsa-speak-kicker">Phase 2 · Speak concisely</span>
      <span class="tsa-speak-title">Explain to Aiko (60s)</span>
      <a class="module-back-link" href="../../member-login/phase-2.html#exercises">← Back to Phase 2 exercises</a>
    </div>
  </header>

  <main class="tsa-speak-main" id="app"></main>

  <script>
    (function () {
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJE--FL2kB_XDNZRnszCtlyLRPvaLAHGuF5TAOdXJk40atbvf5Y6ELuSK2B7CSLaMN/exec';
      const CONTACT_PROFILE_KEY = 'utl_contact_profile';
      const PREP_STORAGE_KEY = 'utl_explain_to_aiko_120_prep';
      const TARGET_SECONDS = 60;
      const TARGET_WORDS = '110-130 words';
      const EMAIL_TO_AIKO = `Hey Aiko!

We believe the Olympics is losing cultural impact primarily due to reduced everyday relevance, fragmented attention, and weaker emotional connection with audiences.

This is driven by three key factors:

Lower day-to-day visibility: The Olympics only peaks every four years, while audiences are now constantly engaged with always-on sports and digital content.

Fragmented media landscape: Viewers are spread across platforms, making it harder for the Olympics to capture sustained, collective attention.

Weaker emotional connection: Fewer consistent athlete narratives and national storylines reduce long-term attachment and anticipation.

As a result, the Olympics is shifting from a unifying global moment to a more episodic and less culturally central event. Happy to walk through implications and potential focus areas next.

Best, Yutee Elle`;

      const app = document.getElementById('app');
      const state = {
        notesMode: 'sections',
        openNotes: '',
        sectionNotes: [
          { title: 'Bottom line', body: '' },
          { title: 'Three reasons', body: '' },
          { title: 'Close / ask', body: '' }
        ],
        transcript: '',
        durationSeconds: 0
      };

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, char => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[char]));
      }

      function wordCount(text) {
        return (text.trim().match(/\b[\w'-]+\b/g) || []).length;
      }

      function readProfileEmail() {
        const directKeys = ['tsa_participant_email', 'find_your_level_email'];
        for (const key of directKeys) {
          const value = sessionStorage.getItem(key);
          if (value) return value;
        }
        try {
          const profile = JSON.parse(sessionStorage.getItem(CONTACT_PROFILE_KEY) || '{}');
          return profile.email || '';
        } catch (error) {
          return '';
        }
      }

      function renderShell(innerHtml) {
        app.innerHTML = `
          <section class="tsa-speak-intro">
            <p class="tsa-speak-label">Phase 2 · Speak concisely</p>
            <h1>Explain to Aiko</h1>
            <p>Turn your written email into a short spoken explanation. Your goal is to make the logic easy to hear, not to read the email word for word.</p>
            <span class="explain-aiko-target">Target: ${TARGET_SECONDS} seconds or less · Recommended: ${TARGET_WORDS}</span>
          </section>
          ${innerHtml}
        `;
      }

      function renderTopicCard() {
        renderShell(`
          <section class="tsa-speak-panel">
            <div class="tsa-speak-panel-head">
              <p class="tsa-speak-progress">Step 1 · Talk brief</p>
              <h2>Now compress it.</h2>
              <p>Now, instead of 120 seconds, see if you can deliver the key points in 60 seconds or less. Keep the bottom line, the strongest supporting reasons, and a clean close.</p>
            </div>
            <div class="tsa-speak-step">
              <div class="tsa-speak-info">
                <h3>What your talk needs to do</h3>
                <ul>
                  <li><strong>Keep the conclusion:</strong> Say the main point first.</li>
                  <li><strong>Choose the essentials:</strong> Keep only the reasons Aiko needs to hear.</li>
                  <li><strong>Close cleanly:</strong> End with the decision, meeting, or follow-up you want.</li>
                </ul>
              </div>
              <div class="tsa-speak-actions">
                <button class="tsa-speak-button" id="readyButton" type="button">I am ready to start preparing</button>
              </div>
            </div>
          </section>
        `);
        document.getElementById('readyButton').addEventListener('click', renderPreparation);
      }

      function captureNotes() {
        const open = document.getElementById('openNotes');
        if (open) state.openNotes = open.value;
        document.querySelectorAll('[data-note-index]').forEach((input) => {
          const index = Number(input.dataset.noteIndex);
          state.sectionNotes[index].title = input.value;
        });
        document.querySelectorAll('[data-note-body]').forEach((textarea) => {
          const index = Number(textarea.dataset.noteBody);
          state.sectionNotes[index].body = textarea.value;
        });
      }

      function sectionNotesText() {
        return state.sectionNotes
          .map((note) => [note.title, note.body].filter(Boolean).join(': '))
          .filter(Boolean)
          .join('\n\n');
      }

      function loadPrepFrom120s() {
        try {
          const saved = JSON.parse(localStorage.getItem(PREP_STORAGE_KEY) || 'null');
          if (!saved) return;
          if (Array.isArray(saved.sectionNotes) && saved.sectionNotes.length) {
            state.sectionNotes = state.sectionNotes.map((fallback, index) => ({
              title: saved.sectionNotes[index]?.title || fallback.title,
              body: saved.sectionNotes[index]?.body || fallback.body
            }));
          }
          state.openNotes = saved.openNotes || saved.prep_notes || state.openNotes;
          state.notesMode = saved.notesMode === 'open' ? 'open' : 'sections';
        } catch (error) {
          console.warn('Could not load Explain to Aiko 120s prep notes.', error);
        }
      }

      function transferNotes(nextMode) {
        captureNotes();
        if (state.notesMode === nextMode) return;
        if (state.notesMode === 'sections' && nextMode === 'open') {
          state.openNotes = sectionNotesText();
        }
        if (state.notesMode === 'open' && nextMode === 'sections') {
          const parts = state.openNotes.split(/\n\s*\n|\n/).map((part) => part.trim()).filter(Boolean);
          parts.slice(0, 3).forEach((part, index) => {
            const split = part.split(':');
            if (split.length > 1 && split[0].length < 40) {
              state.sectionNotes[index].title = split.shift().trim();
              state.sectionNotes[index].body = split.join(':').trim();
            } else {
              state.sectionNotes[index].body = part;
            }
          });
        }
        state.notesMode = nextMode;
      }

      function notesModeSwitch() {
        return `
          <div class="tsa-speak-mode-switch" aria-label="Answer input mode">
            <button class="tsa-speak-mode-btn ${state.notesMode === 'open' ? 'is-active' : ''}" type="button" data-mode-value="open">Open response</button>
            <button class="tsa-speak-mode-btn ${state.notesMode === 'sections' ? 'is-active' : ''}" type="button" data-mode-value="sections">Three-section response</button>
          </div>
        `;
      }

      function notesHtml() {
        if (state.notesMode === 'open') {
          return `<textarea class="tsa-speak-textarea" id="openNotes" placeholder="Write your 60-second talking points here...">${escapeHtml(state.openNotes)}</textarea>`;
        }
        return `
          <div class="tsa-speak-notes-grid">
            ${state.sectionNotes.map((note, index) => `
              <label class="tsa-speak-note-card">
                <span class="tsa-speak-field-label">Section ${index + 1}</span>
                <input class="tsa-speak-note-title" type="text" data-note-index="${index}" value="${escapeHtml(note.title)}" />
                <textarea class="tsa-speak-note-input" data-note-body="${index}" placeholder="Bullet responses...">${escapeHtml(note.body)}</textarea>
              </label>
            `).join('')}
          </div>
        `;
      }

      function renderPreparation() {
        renderShell(`
          <section class="tsa-speak-panel">
            <div class="tsa-speak-panel-head">
              <p class="tsa-speak-progress">Step 2 · Preparation notes</p>
              <h2>Prepare your 60-second talk.</h2>
              <p>Use the email as your source. Prepare spoken talking points that sound natural out loud and fit roughly ${TARGET_WORDS}.</p>
            </div>
            <div class="tsa-speak-step">
              <div class="tsa-speak-prep-grid">
                <section class="tsa-speak-prep-topic">
                  <h3>Email to Aiko</h3>
                  <p class="explain-aiko-email">${escapeHtml(EMAIL_TO_AIKO)}</p>
                </section>
                <section class="tsa-speak-prep-notes">
                  <h3>Talking points prep</h3>
                  ${notesModeSwitch()}
                  <div id="notesArea">${notesHtml()}</div>
                </section>
              </div>
              <div class="tsa-speak-actions">
                <button class="tsa-speak-button" id="recordButton" type="button">I am ready to record</button>
              </div>
            </div>
          </section>
        `);
        document.querySelectorAll('.tsa-speak-mode-btn').forEach((button) => {
          button.addEventListener('click', () => {
            transferNotes(button.dataset.modeValue);
            renderPreparation();
          });
        });
        document.getElementById('recordButton').addEventListener('click', () => {
          captureNotes();
          renderRecording();
        });
      }

      function helpPanel() {
        const icons = {
          camera: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="18" y="4" width="28" height="40" rx="5" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><rect x="22" y="10" width="20" height="25" rx="2" fill="#F3EDE2" stroke="#003366" stroke-width="1.5"/><path d="M27 18h8l5-3v12l-5-3h-8z" fill="#EEA320" stroke="#003366" stroke-width="1.4"/><circle cx="32" cy="39" r="1.8" fill="#003366"/></svg>',
          record: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="18" y="4" width="28" height="40" rx="5" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><rect x="22" y="10" width="20" height="25" rx="2" fill="#F3EDE2" stroke="#003366" stroke-width="1.5"/><circle cx="32" cy="22" r="7" fill="#EEA320" stroke="#003366" stroke-width="1.5"/><circle cx="32" cy="22" r="3.5" fill="#B85B5B"/><circle cx="32" cy="39" r="1.8" fill="#003366"/></svg>',
          laptop: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="13" y="9" width="38" height="26" rx="3" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><path d="M8 39h48l-4-4H12z" fill="#F3EDE2" stroke="#003366" stroke-width="2" stroke-linejoin="round"/><circle cx="24" cy="22" r="5" fill="#EEA320" stroke="#003366" stroke-width="1.5"/><path d="M32 18h10M32 24h7" stroke="#003366" stroke-width="2" stroke-linecap="round"/><path d="M23 22l2 2 4-5" stroke="#003366" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
          audio: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="5" y="13" width="18" height="30" rx="4" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><rect x="8" y="18" width="12" height="18" rx="2" fill="#F3EDE2" stroke="#003366" stroke-width="1.4"/><rect x="37" y="10" width="21" height="21" rx="2" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><path d="M33 35h29l-4-4H37z" fill="#F3EDE2" stroke="#003366" stroke-width="2" stroke-linejoin="round"/><path d="M27 21c3 2 3 8 0 10M31 17c6 5 6 14 0 18" stroke="#EEA320" stroke-width="2.4" stroke-linecap="round"/></svg>',
          select: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="8" y="7" width="39" height="34" rx="3" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><rect x="14" y="15" width="25" height="5" rx="1" fill="#EEA320" opacity=".72"/><path d="M14 26h24M14 32h18" stroke="#003366" stroke-width="2" stroke-linecap="round"/><path d="M44 24l9 13 2-7 6-2z" fill="#F3EDE2" stroke="#003366" stroke-width="2" stroke-linejoin="round"/></svg>',
          paste: '<svg class="tsa-speak-step-icon" viewBox="0 0 64 48" fill="none" aria-hidden="true"><rect x="9" y="9" width="22" height="30" rx="3" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><path d="M16 9c0-3 8-3 8 0h4v6H12V9z" fill="#F3EDE2" stroke="#003366" stroke-width="2" stroke-linejoin="round"/><rect x="39" y="14" width="18" height="24" rx="3" fill="#FFFFFF" stroke="#003366" stroke-width="2"/><path d="M17 23h8M17 29h8M32 24h12" stroke="#003366" stroke-width="2" stroke-linecap="round"/><path d="M40 19l5 5-5 5" stroke="#EEA320" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        };
        return `
          <details class="tsa-speak-record-help">
            <summary>How to record and transcribe</summary>
            <div class="tsa-speak-help-body">
              <h3>How to record and transcribe your talk: 6 steps</h3>
              <ol class="tsa-speak-help-steps">
                <li>${icons.camera}<strong>Open your camera app:</strong> Open your phone's native camera app and switch to video mode. Make sure sound is on and you have storage space.</li>
                <li>${icons.record}<strong>Record your talk:</strong> Prop your phone up so it can capture you clearly. Hit record, give your talk, then stop recording when you are done.</li>
                <li>${icons.laptop}<strong>Open ChatGPT on your laptop:</strong> Go to chatgpt.com. Click the microphone icon to start voice input. Place your phone close to the laptop microphone.</li>
                <li>${icons.audio}<strong>Play your video out loud:</strong> Play the recorded video on your phone while ChatGPT listens through the laptop mic. It transcribes in real time.</li>
                <li>${icons.select}<strong>Copy the transcript:</strong> Once the video ends, stop ChatGPT voice input. Select all the transcribed text and copy it.</li>
                <li>${icons.paste}<strong>Paste and submit:</strong> Paste the transcript into the box below. Review it quickly, then submit.</li>
              </ol>
              <p><strong>Alternative free tools if ChatGPT is unavailable:</strong></p>
              <ul>
                <li><strong>Google Docs voice typing:</strong> Use Tools, then Voice typing. It is free and works in Chrome.</li>
                <li><strong>Otter.ai free tier:</strong> Upload your video file directly. It transcribes automatically.</li>
                <li><strong>Manual fallback:</strong> If transcription fails, type what you said as accurately as you can. Minimum 50 words required to submit.</li>
              </ul>
            </div>
          </details>
        `;
      }

      function renderRecording() {
        renderShell(`
          <section class="tsa-speak-panel">
            <div class="tsa-speak-panel-head">
              <p class="tsa-speak-progress">Step 3 · Recording · 60 seconds</p>
              <h2>Record your talk.</h2>
              <p>Record yourself for 60 seconds or less. Aim for ${TARGET_WORDS}. When you are done, transcribe your recording and paste the result below.</p>
            </div>
            <div class="tsa-speak-step">
              ${helpPanel()}
              <label class="tsa-speak-field-label" for="explainTranscript">Your transcript</label>
              <textarea class="tsa-speak-textarea" id="explainTranscript" placeholder="Paste your transcript here...">${escapeHtml(state.transcript)}</textarea>
              <div class="tsa-speak-time-grid" aria-label="Recording time">
                <label for="explainMinutes">Minutes
                  <input id="explainMinutes" type="number" min="0" max="10" inputmode="numeric" placeholder="2">
                </label>
                <label for="explainSeconds">Seconds
                  <input id="explainSeconds" type="number" min="0" max="59" inputmode="numeric" placeholder="00">
                </label>
              </div>
              <p class="tsa-speak-count" id="transcriptCount">0 characters · 0 words</p>
              <div class="tsa-speak-actions">
                <a class="tsa-speak-link-button secondary" href="../../member-login/index.html#phase2">Back to member workspace</a>
                <button class="tsa-speak-link-button secondary" id="backToPrep" type="button">Back to prep</button>
                <button class="tsa-speak-button" id="submitTranscript" type="button" disabled>Submit my transcript</button>
              </div>
              <p class="explain-aiko-submit-status" id="submitStatus" role="status" aria-live="polite"></p>
            </div>
          </section>
        `);
        const textarea = document.getElementById('explainTranscript');
        const count = document.getElementById('transcriptCount');
        const submit = document.getElementById('submitTranscript');
        const status = document.getElementById('submitStatus');

        function update() {
          state.transcript = textarea.value;
          const chars = textarea.value.trim().length;
          count.textContent = `${chars} characters · ${wordCount(textarea.value)} words · Target: ${TARGET_WORDS}`;
          submit.disabled = chars < 50;
          status.textContent = '';
        }

        textarea.addEventListener('input', update);
        textarea.addEventListener('paste', function () { setTimeout(update, 0); });
        document.getElementById('backToPrep').addEventListener('click', renderPreparation);
        submit.addEventListener('click', async () => {
          const mins = Math.max(0, Number(document.getElementById('explainMinutes').value || 0));
          const secs = Math.min(59, Math.max(0, Number(document.getElementById('explainSeconds').value || 0)));
          state.durationSeconds = (mins * 60) + secs;
          submit.disabled = true;
          submit.textContent = 'Submitting...';

          const payload = {
            email: readProfileEmail(),
            exercise: 'explain-to-aiko-60s',
            transcript: state.transcript.trim(),
            duration_seconds: state.durationSeconds,
            target_seconds: TARGET_SECONDS,
            recommended_words: TARGET_WORDS,
            prep_notes: state.notesMode === 'open' ? state.openNotes : sectionNotesText(),
            page: window.location.href,
            submitted_at: new Date().toISOString()
          };

          try {
            await fetch(SCRIPT_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(payload)
            });
          } catch (error) {
            console.warn('Submission failed.', error);
          } finally {
            localStorage.setItem('utl_result_explain_to_aiko_60', JSON.stringify(payload));
            import('../../assets/firebase.js')
              .then(({ saveUserProgress }) => saveUserProgress('explain-to-aiko-60', 'Explain to Aiko (60s)', payload))
              .catch((error) => console.warn('Firestore progress save failed.', error));
            renderCompletion();
          }
        });
        update();
      }

      function renderCompletion() {
        renderShell(`
          <section class="tsa-speak-panel">
            <div class="tsa-speak-panel-head">
              <p class="tsa-speak-progress">Complete</p>
              <h2>You just delivered the elevator pitch.</h2>
              <p>Nice work. Compressing a full explanation into 60 seconds is the skill: keep the point, protect the logic, and cut everything else.</p>
            </div>
            <div class="tsa-speak-step">
              <div class="tsa-speak-info">
                <h3>What you practiced</h3>
                <ul>
                  <li><strong>Compression:</strong> You kept the core message under tighter time pressure.</li>
                  <li><strong>Prioritization:</strong> You decided what Aiko needed most.</li>
                  <li><strong>Executive delivery:</strong> You turned an email into a short elevator pitch.</li>
                </ul>
              </div>
              <div class="tsa-speak-actions">
                <button class="tsa-speak-button secondary" id="tryAgain" type="button">Try again</button>
                <a class="tsa-speak-link-button" href="../../member-login/index.html#phase2">Back to workspace</a>
              </div>
            </div>
          </section>
        `);
        document.getElementById('tryAgain').addEventListener('click', renderRecording);
      }

      loadPrepFrom120s();
      renderTopicCard();
    })();
  </script>
  <script type="module" src="../../assets/feedback-widget.js?v=4"></script>
</body>
