<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find your level public exercise from The Untaught Lessons." />
  <title>Find your level | The Untaught Lessons</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="shortcut icon" type="image/png" href="../../assets/favicon-bluebg-whitedoor-thicker-32.png?v=6">
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/apple-touch-icon.png?v=3">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@400;500;700&display=swap');

    :root {
      --cream: #F3EDE2;
      --navy: #003366;
      --gold: #EEA320;
      --charcoal: #4A4A4A;
      --steel: #4D7094;
      --white: #FFFFFF;
      --line: rgba(0, 51, 102, .14);
      --shadow: 0 18px 44px rgba(0, 51, 102, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Lato', sans-serif;
    }

    body.tsa-locked {
      overflow: hidden;
    }

    .tsa-header {
      position: sticky;
      top: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: auto auto minmax(220px, 1fr) auto;
      align-items: center;
      gap: 20px;
      min-height: 76px;
      padding: 12px 32px;
      background: var(--navy);
      color: var(--white);
    }

    .tsa-logo {
      display: block;
      width: 224px;
      height: 46px;
    }

    .tsa-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .tsa-divider {
      width: 1px;
      height: 38px;
      background: rgba(255, 255, 255, .42);
    }

    .tsa-kicker {
      display: block;
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .tsa-title {
      display: block;
      margin-top: 3px;
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .timer {
      min-width: 150px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
    }

    .timer span {
      display: block;
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .timer strong {
      display: block;
      margin-top: 3px;
      color: var(--white);
      font-family: 'Roboto Mono', monospace;
      font-size: 22px;
      line-height: 1;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      align-items: start;
      justify-items: center;
      overflow-y: auto;
      padding: 24px;
      background: var(--cream);
    }

    .gate.is-hidden {
      display: none;
    }

    .gate-card,
    .panel,
    .score-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .gate-card {
      width: min(100%, 520px);
      margin: auto 0;
      padding: 34px;
      border-top: 4px solid var(--gold);
    }

    .gate-logo {
      width: 140px;
      margin: 0 auto 24px;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      color: var(--navy);
      font-family: 'Playfair Display', serif;
      line-height: 1.12;
    }

    .gate-card h1 {
      text-align: center;
      font-size: clamp(34px, 6vw, 48px);
    }

    .gate-card p,
    .intro p,
    .panel p,
    .score-card p {
      color: var(--charcoal);
      font-size: 17px;
      line-height: 1.6;
    }

    .gate-card p {
      text-align: center;
    }

    .form {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    label,
    .label {
      color: var(--navy);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 48px;
      padding: 11px 12px;
      border: 1px solid rgba(0, 51, 102, .22);
      border-radius: 8px;
      background: var(--white);
      color: var(--charcoal);
      font: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    button,
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 18px;
      border: 1px solid var(--gold);
      border-radius: 6px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .main {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 56px 24px 82px;
    }

    .intro {
      max-width: 760px;
      margin-bottom: 26px;
    }

    .intro h1 {
      font-size: clamp(40px, 6vw, 66px);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, .85fr) minmax(520px, 1.7fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      padding: 24px;
    }

    .bucket-naming {
      display: grid;
      gap: 12px;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: minmax(280px, .8fr) minmax(620px, 1.6fr);
      gap: 18px;
      align-items: stretch;
      margin-top: 18px;
    }

    .item-list {
      min-height: 320px;
      padding: 16px;
      border: 1px dashed rgba(0, 51, 102, .25);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(243, 237, 226, .75), rgba(255, 255, 255, .95));
      transition: .15s ease;
    }

    .bucket-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .bucket {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      min-height: 380px;
      transition: .15s ease;
    }

    .bucket-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(243, 237, 226, 0.45);
      border-radius: 11px 11px 0 0;
    }

    .bucket-head label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .bucket-head select {
      background: var(--white);
      font-weight: 700;
      margin-bottom: 0;
    }

    .bucket-drop {
      flex: 1;
      margin: 10px;
      padding: 8px;
      border: 2px dashed rgba(0, 51, 102, .18);
      border-radius: 10px;
      background: #FAF8F3;
      min-height: 200px;
      transition: .15s ease;
    }

    .bucket.is-target {
      border-color: var(--gold);
    }

    .bucket.is-target .bucket-drop,
    .item-list.is-target {
      border-color: var(--gold);
      background: #fff7e9;
      box-shadow: 0 0 0 2px rgba(238, 163, 32, .22);
    }

    .bucket h3,
    .item-list h3 {
      margin-bottom: 12px;
      font-size: 20px;
    }

    .items {
      display: grid;
      gap: 9px;
    }

    .pill {
      width: 100%;
      min-height: 42px;
      justify-content: flex-start;
      padding: 10px 12px;
      border: 1px solid rgba(0, 51, 102, .16);
      border-radius: 10px;
      background: #fff;
      color: var(--navy);
      box-shadow: none;
      font-weight: 700;
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .pill.is-selected {
      border-color: var(--gold);
      background: #fff7e9;
      box-shadow: 0 0 0 2px rgba(238, 163, 32, .25);
      transform: translateY(-1px);
    }

    .empty {
      margin: 18px 0 0;
      color: var(--steel);
      font-style: italic;
      text-align: center;
    }

    .status {
      margin: 16px 0 0;
      color: var(--steel);
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 18px;
    }

    .score-card {
      max-width: 820px;
      margin: 0 auto;
      padding: 38px 36px 42px;
      border-top: 4px solid var(--gold);
      text-align: center;
    }

    .score-card h1 {
      margin-bottom: 22px;
    }

    .score-card h2 {
      margin-top: 30px;
    }

    .score {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      gap: 14px;
      margin: 0 0 28px;
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: clamp(36px, 6vw, 58px);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
    }

    .score-label {
      font-size: clamp(20px, 3vw, 30px);
    }

    .score-value {
      font-size: inherit;
    }

    .band-card {
      margin: 4px auto 0;
      padding: 26px 28px;
      border: 1px solid rgba(0, 51, 102, .12);
      border-left: 6px solid var(--steel);
      border-radius: 10px;
      background: #F8FAF9;
      text-align: left;
    }

    .band-card h2 {
      margin: 8px 0 16px;
      font-size: clamp(26px, 4vw, 36px);
    }

    .band-card p {
      margin-bottom: 0;
    }

    .score-card .button {
      margin-top: 8px;
    }

    .band-card[data-band-color="teal"] { border-left-color: #2F7D72; background: #F2FAF8; }
    .band-card[data-band-color="green"] { border-left-color: #2F7D4F; background: #F4FBF6; }
    .band-card[data-band-color="blue"] { border-left-color: var(--steel); background: #F3F7FB; }
    .band-card[data-band-color="amber"] { border-left-color: var(--gold); background: #FFF8EA; }
    .band-card[data-band-color="coral"] { border-left-color: #C8634A; background: #FFF5F1; }

    .answer-key {
      max-width: 820px;
      margin: 28px auto 0;
      padding: 28px 34px 34px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--white);
      box-shadow: var(--shadow);
      text-align: left;
    }

    .answer-key h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .answer-key .answer-rationale {
      color: var(--steel);
      font-style: italic;
      font-size: 15px;
      margin: 0 0 22px;
      line-height: 1.6;
    }

    .answer-key-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .answer-col-head {
      background: var(--navy);
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 8px 12px;
      border-radius: 6px 6px 0 0;
    }

    .answer-col-body {
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 4px 0;
    }

    .answer-item {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,51,102,.07);
    }

    .answer-item:last-child { border-bottom: none; }

    .answer-item-text {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }

    .answer-item-reason {
      font-size: 12px;
      color: var(--steel);
      line-height: 1.45;
    }

    .answer-edge-note {
      margin: 18px 0 0;
      padding: 12px 16px;
      background: #FFF8EC;
      border: 1px solid rgba(238,163,32,.35);
      border-radius: 6px;
      font-size: 13px;
      color: var(--charcoal);
      line-height: 1.5;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      .answer-key-grid { grid-template-columns: 1fr; }
      .answer-key { padding: 20px 18px 24px; }
    }

    @media (max-width: 920px) {
      .tsa-header {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px 20px;
      }

      .tsa-logo {
        width: 172px;
        height: 40px;
      }

      .tsa-divider {
        display: none;
      }

      .timer {
        width: 100%;
      }

      .workspace,
      .exercise-grid,
      .bucket-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="tsa-locked">
  <header class="tsa-header">
    <a class="tsa-logo" href="../../index.html" aria-label="The Untaught Lessons home">
      <img src="../../assets/utl-logo-nav-white.png" alt="The Untaught Lessons" />
    </a>
    <div class="tsa-divider" aria-hidden="true"></div>
    <div>
      <span class="tsa-kicker">Think clearly</span>
      <span class="tsa-title">Find your level</span>
    </div>
    <div class="timer" aria-label="Elapsed time">
      <span>Elapsed time</span>
      <strong id="timerDisplay">00:00</strong>
    </div>
  </header>

  <section class="gate" id="gate" aria-labelledby="gateTitle">
    <div class="gate-card">
      <img class="gate-logo" src="../../assets/logo.png" alt="The Untaught Lessons" />
      <h1 id="gateTitle">Before we show you your results, enter your details below.</h1>
      <p>Your score will be sent to your email. We will not spam you.</p>
      <form class="form" id="gateForm">
        <label for="fullName">Full name</label>
        <input id="fullName" name="name" type="text" autocomplete="name" required>

        <label for="emailAddress">Email</label>
        <input id="emailAddress" name="email" type="email" autocomplete="email" required>

        <label for="roleTitle">Role</label>
        <select id="roleTitle" name="role">
          <option value="" selected>Select your role</option>
          <option value="Student">Student</option>
          <option value="Professional">Professional</option>
          <option value="Manager">Manager</option>
          <option value="Other">Other</option>
        </select>

        <label for="leadReason">What brings you here?</label>
        <textarea id="leadReason" name="message" rows="3" placeholder="Tell us what you are looking for"></textarea>

        <button id="startButton" type="submit">Start the exercise</button>
      </form>
    </div>
  </section>

  <main class="main" id="app" hidden></main>

  <script type="module">
    import { getBand, scoreExercise } from '../../data/tsa-score-bands.js';

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzJE--FL2kB_XDNZRnszCtlyLRPvaLAHGuF5TAOdXJk40atbvf5Y6ELuSK2B7CSLaMN/exec';
    const DATA_URL = '../../data/sort-bucket.json';
    const gate = document.getElementById('gate');
    const gateForm = document.getElementById('gateForm');
    const startButton = document.getElementById('startButton');
    const app = document.getElementById('app');
    const timerDisplay = document.getElementById('timerDisplay');
    const CONTACT_SESSION_KEY = 'utl_contact_shared';
    const CONTACT_PROFILE_KEY = 'utl_contact_profile';
    const MEMBER_PROFILE_KEY = 'utl_member_profile';
    const ADMIN_AUTH_KEY = 'utl_admin_auth';
    const ADMIN_BYPASS_KEY = 'utl_find_level_admin_bypass';
    const EXERCISE_MODE_KEY = 'utl_find_level_exercise_mode';
    const EXERCISE_ID_KEY = 'utl_find_level_exercise_id';
    const BOOTSTRAP_OWNER_EMAILS = ['wenszu@gmail.com'];
    let firebaseModulePromise = null;
    let exercise = null;
    let selectedItem = null;
    let timerStartedAt = null;
    let timerInterval = null;
    const state = {
      participant: { name: '', email: '' },
      adminPreview: false,
      bucketLabels: ['', '', ''],
      placements: {}
    };

    function loadFirebaseModule() {
      if (!firebaseModulePromise) firebaseModulePromise = import('../../assets/firebase.js');
      return firebaseModulePromise;
    }

    function readContactProfile() {
      if (sessionStorage.getItem(CONTACT_SESSION_KEY) !== 'true') return null;
      try {
        const profile = JSON.parse(sessionStorage.getItem(CONTACT_PROFILE_KEY) || '{}');
        return profile.name && profile.email ? profile : null;
      } catch (error) {
        return null;
      }
    }

    function readMemberProfile() {
      try {
        return JSON.parse(localStorage.getItem(MEMBER_PROFILE_KEY) || '{}') || {};
      } catch (error) {
        return {};
      }
    }

    function profileName(profile, fallback) {
      return [profile.firstName, profile.lastName].filter(Boolean).join(' ').trim() ||
        profile.displayName ||
        profile.name ||
        fallback ||
        'Admin';
    }

    function localAdminPreviewProfile() {
      const profile = readMemberProfile();
      const role = String(profile.role || '').toLowerCase();
      if (role === 'admin' || role === 'owner' || localStorage.getItem(ADMIN_AUTH_KEY) === 'true') {
        const email = profile.email || localStorage.getItem('utl_member_username') || '';
        return {
          name: profileName(profile, email || 'Admin'),
          email,
          role: role || 'admin'
        };
      }
      return null;
    }

    async function firebaseAdminPreviewProfile() {
      try {
        const fb = await loadFirebaseModule();
        const user = fb.getSignedInUser ? await fb.getSignedInUser() : null;
        const email = user && user.email ? String(user.email).trim().toLowerCase() : '';
        if (!email) return null;
        if (BOOTSTRAP_OWNER_EMAILS.includes(email)) {
          return { name: user.displayName || email, email, role: 'owner' };
        }
        const member = fb.getAuthorizedMember ? await fb.getAuthorizedMember(email) : null;
        const role = String((member && member.role) || '').toLowerCase();
        if (role === 'admin' || role === 'owner') {
          return { name: user.displayName || member.name || email, email, role };
        }
      } catch (error) {
        console.warn('Could not check admin preview role.', error);
      }
      return null;
    }

    async function adminLeadGateBypassEnabled() {
      let enabled = localStorage.getItem(ADMIN_BYPASS_KEY) !== 'off';
      try {
        const fb = await loadFirebaseModule();
        if (fb.getAdminVisibilitySettings) {
          const settings = await fb.getAdminVisibilitySettings();
          enabled = settings.findLevelLeadGateBypass !== false;
          localStorage.setItem(ADMIN_BYPASS_KEY, enabled ? 'on' : 'off');
        }
      } catch (error) {
        // Keep the local/default setting if Firebase is unavailable.
      }
      return enabled;
    }

    function rememberContact(payload) {
      sessionStorage.setItem(CONTACT_SESSION_KEY, 'true');
      sessionStorage.setItem(CONTACT_PROFILE_KEY, JSON.stringify({
        name: payload.name || '',
        email: payload.email || '',
        role: payload.role || '',
        message: payload.message || '',
        source: payload.source || ''
      }));
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function formatSeconds(total) {
      return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    }

    function startTimer() {
      if (timerStartedAt) return;
      timerStartedAt = Date.now();
      timerInterval = setInterval(() => {
        timerDisplay.textContent = formatSeconds(Math.floor((Date.now() - timerStartedAt) / 1000));
      }, 1000);
    }

    async function loadExerciseSettings() {
      var settings = {
        findLevelExerciseMode: localStorage.getItem(EXERCISE_MODE_KEY) || 'random',
        findLevelExerciseId: localStorage.getItem(EXERCISE_ID_KEY) || 'sort_bucket_001'
      };
      try {
        const fb = await loadFirebaseModule();
        if (fb.getPublicAssessmentSettings) {
          const remote = await fb.getPublicAssessmentSettings();
          settings.findLevelExerciseMode = remote.findLevelExerciseMode || settings.findLevelExerciseMode || 'random';
          settings.findLevelExerciseId = remote.findLevelExerciseId || settings.findLevelExerciseId || 'sort_bucket_001';
          localStorage.setItem(EXERCISE_MODE_KEY, settings.findLevelExerciseMode);
          localStorage.setItem(EXERCISE_ID_KEY, settings.findLevelExerciseId);
        }
      } catch (error) {
        // Keep local/default settings if Firebase is unavailable.
      }
      return settings;
    }

    async function loadExercise() {
      const response = await fetch(DATA_URL);
      if (!response.ok) throw new Error('Unable to load exercise data.');
      const data = await response.json();
      const available = data.filter(item => item && item.exercise_id && Array.isArray(item.items));
      if (!available.length) throw new Error('No Find your level exercises were found.');
      const settings = await loadExerciseSettings();
      const fixed = available.find(item => item.exercise_id === settings.findLevelExerciseId);
      exercise = settings.findLevelExerciseMode === 'fixed'
        ? (fixed || available[0])
        : available[Math.floor(Math.random() * available.length)];
      exercise = Object.assign({}, exercise, { items: shuffle(exercise.items || []) });
    }

    function renderShell(inner) {
      const scenarioHtml = exercise.scenario
        ? `<p>${escapeHtml(exercise.scenario)}</p>`
        : '';
      app.innerHTML = `
        <section class="intro">
          <span class="label">Public exercise</span>
          <h1>Find your level</h1>
          ${scenarioHtml}
          <p>${escapeHtml(exercise.prompt)}</p>
        </section>
        ${inner}
      `;
    }

    function renderNaming() {
      renderShell(`
        <section class="workspace">
          <article class="panel">
            <h2>${escapeHtml(exercise.exercise_title)}</h2>
            <p>Before placing any items, name your three buckets. Choose from the options below.</p>
            <div class="bucket-naming">
              ${[0, 1, 2].map(index => `
                <label for="bucketLabel${index}">Bucket ${index + 1}</label>
                <select id="bucketLabel${index}" data-label-index="${index}">
                  <option value="">Choose a label</option>
                  ${exercise.label_word_bank.map(label => `<option value="${escapeHtml(label)}">${escapeHtml(label)}</option>`).join('')}
                </select>
              `).join('')}
            </div>
            <div class="actions">
              <button id="continueButton" type="button" disabled>Continue</button>
            </div>
          </article>
          <article class="panel">
            <h2>Items you will sort</h2>
            <div class="items">
              ${exercise.items.map(item => `<div class="pill">${escapeHtml(item.text)}</div>`).join('')}
            </div>
          </article>
        </section>
      `);
      document.querySelectorAll('[data-label-index]').forEach(select => {
        select.addEventListener('change', () => {
          state.bucketLabels[Number(select.dataset.labelIndex)] = select.value;
          const chosen = new Set(state.bucketLabels.filter(Boolean));
          document.getElementById('continueButton').disabled = !(state.bucketLabels.every(Boolean) && chosen.size === 3);
          refreshDisabledOptions();
        });
      });
      document.getElementById('continueButton').addEventListener('click', renderSorting);
      refreshDisabledOptions();
    }

    function refreshDisabledOptions() {
      const chosen = new Set(state.bucketLabels.filter(Boolean));
      document.querySelectorAll('[data-label-index]').forEach(select => {
        [...select.options].forEach(option => {
          option.disabled = Boolean(option.value && chosen.has(option.value) && option.value !== select.value);
        });
      });
    }

    function getItemLocation(itemId) {
      return state.placements[itemId] || 'unplaced';
    }

    function moveItem(itemId, target) {
      if (target === 'unplaced') delete state.placements[itemId];
      else state.placements[itemId] = target;
      selectedItem = null;
      renderSorting();
    }

    function renderSorting() {
      renderShell(`
        <section class="panel">
          <h2>Sort the items</h2>
          <p>Choose a label for each bucket, then move every item into the bucket where it belongs. On desktop, drag cards into a bucket. On mobile, tap an item, then tap the bucket.</p>
          <div class="exercise-grid">
            <div class="item-list" data-zone="unplaced">
              <h3>Unplaced items</h3>
              <div class="items" id="unplacedItems"></div>
            </div>
            <div class="bucket-grid" id="bucketGrid"></div>
          </div>
          <p class="status" id="statusLine"></p>
          <div class="actions">
            <button id="submitButton" type="button" disabled>Submit</button>
          </div>
        </section>
      `);
      updateSortingZones();
      document.getElementById('submitButton').addEventListener('click', showScore);
    }

    function itemButton(item) {
      return `<button class="pill" type="button" draggable="true" data-item-id="${item.item_id}">${escapeHtml(item.text)}</button>`;
    }

    function updateSortingZones() {
      const unplaced = exercise.items.filter(item => getItemLocation(item.item_id) === 'unplaced');
      document.getElementById('unplacedItems').innerHTML = unplaced.map(itemButton).join('') || '<p class="empty">All items placed.</p>';
      document.getElementById('bucketGrid').innerHTML = [0, 1, 2].map(index => {
        const zone = `bucket-${index}`;
        const items = exercise.items.filter(item => getItemLocation(item.item_id) === zone);
        return `
          <section class="bucket" data-zone="${zone}">
            <div class="bucket-head">
              <label for="bucketLabel${index}">Name this bucket</label>
              <select id="bucketLabel${index}" data-label-index="${index}">
                <option value="">Choose a label</option>
                ${exercise.label_word_bank.map(label => `<option value="${escapeHtml(label)}"${state.bucketLabels[index] === label ? ' selected' : ''}>${escapeHtml(label)}</option>`).join('')}
              </select>
            </div>
            <div class="bucket-drop">
              <div class="items">${items.map(itemButton).join('')}</div>
              ${items.length ? '' : '<p class="empty">Drop or tap items here.</p>'}
            </div>
          </section>
        `;
      }).join('');
      wireBucketLabels();
      wireMovement();
      const placed = Object.keys(state.placements).length;
      document.getElementById('statusLine').textContent = `${placed} of ${exercise.items.length} items placed`;
      const chosen = new Set(state.bucketLabels.filter(Boolean));
      document.getElementById('submitButton').disabled = placed !== exercise.items.length || !state.bucketLabels.every(Boolean) || chosen.size !== 3;
    }

    function wireBucketLabels() {
      document.querySelectorAll('[data-label-index]').forEach(select => {
        select.addEventListener('change', () => {
          state.bucketLabels[Number(select.dataset.labelIndex)] = select.value;
          updateSortingZones();
        });
      });
      refreshDisabledOptions();
    }

    function wireMovement() {
      document.querySelectorAll('.pill[data-item-id]').forEach(button => {
        button.classList.toggle('is-selected', button.dataset.itemId === selectedItem);
        button.addEventListener('click', event => {
          event.stopPropagation();
          selectedItem = selectedItem === button.dataset.itemId ? null : button.dataset.itemId;
          document.querySelectorAll('.pill[data-item-id]').forEach(btn => btn.classList.toggle('is-selected', btn.dataset.itemId === selectedItem));
        });
        button.addEventListener('dragstart', event => {
          event.dataTransfer.setData('text/plain', button.dataset.itemId);
        });
      });
      document.querySelectorAll('[data-zone]').forEach(zone => {
        zone.addEventListener('click', event => {
          if (!selectedItem || event.target.closest('.pill')) return;
          moveItem(selectedItem, zone.dataset.zone);
        });
        zone.addEventListener('dragover', event => {
          event.preventDefault();
          zone.classList.add('is-target');
        });
        zone.addEventListener('dragleave', () => zone.classList.remove('is-target'));
        zone.addEventListener('drop', event => {
          event.preventDefault();
          zone.classList.remove('is-target');
          const itemId = event.dataTransfer.getData('text/plain');
          if (itemId) moveItem(itemId, zone.dataset.zone);
        });
      });
    }

    function calculateScore() {
      const placements = {};
      Object.entries(state.placements).forEach(([itemId, zone]) => {
        placements[itemId] = Number(String(zone).replace('bucket-', ''));
      });
      const result = scoreExercise(exercise, state.bucketLabels, placements);
      const band = result.band || getBand(result.total);
      return {
        labelScore: result.labelScore,
        placementScore: result.placementScore,
        perfectBonus: result.perfectBonus,
        total: result.total,
        percentage: result.total,
        band: band
      };
    }

    async function submitAssessmentResult(score) {
      if (state.adminPreview) return;
      // The current Apps Script endpoint must route this payload to the Assessments tab.
      // If the deployed script only writes contact leads today, update it to branch on assessment_type.
      const payload = {
        email: sessionStorage.getItem('find_your_level_email') || state.participant.email,
        assessment_type: 'find-your-level',
        version: '',
        score: score.percentage,
        variation_id: exercise.exercise_id || '',
        submitted_at: new Date().toISOString()
      };
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
      } catch (error) {
        console.warn('Assessment result submission failed.', error);
      }
      import('../../assets/firebase.js')
        .then(({ saveUserProgress }) => saveUserProgress('find-your-level', 'Find your level', payload))
        .catch((error) => console.warn('Firestore progress save failed.', error));
    }

    async function startExerciseForParticipant(profile, options = {}) {
      state.participant = {
        name: profile.name || '',
        email: profile.email || ''
      };
      state.adminPreview = Boolean(options.adminPreview);
      sessionStorage.setItem('find_your_level_name', state.participant.name);
      sessionStorage.setItem('find_your_level_email', state.participant.email);
      await loadExercise();
      gate.classList.add('is-hidden');
      document.body.classList.remove('tsa-locked');
      app.hidden = false;
      startTimer();
      renderSorting();
    }

    function renderAnswerKey() {
      const sa = exercise.sample_answer;
      if (!sa) return '';
      const edgeNote = sa.edge_note
        ? `<p class="answer-edge-note"><strong>Edge case:</strong> ${escapeHtml(sa.edge_note)}</p>`
        : '';
      return `
        <div class="answer-key">
          <h2>How the model answer sorts it</h2>
          <p class="answer-rationale">${escapeHtml(sa.rationale || '')}</p>
          ${edgeNote}
        </div>`;
    }

    function showScore() {
      clearInterval(timerInterval);
      const score = calculateScore();
      const band = score.band || getBand(score.percentage) || {};
      const firstName = (state.participant.name || 'there').trim().split(/\s+/)[0];
      app.innerHTML = `
        <section class="score-card">
          <span class="label">Your result</span>
          <h1>${escapeHtml(firstName)}, your score is ready.</h1>
          <div class="score"><span class="score-label">Your score:</span><span class="score-value">${score.percentage}%</span></div>
          <div class="band-card" data-band-color="${escapeHtml(band.color || 'blue')}">
            <span class="label">What this means</span>
            <h2>${escapeHtml(band.label || 'Your result')}</h2>
            <p>${escapeHtml(band.description || 'This exercise tested how you organise information into clean, non-overlapping categories - one of the core skills in the UTL program.')}</p>
          </div>
          <h2>Ready to close the gap?</h2>
          <p>The UTL program teaches you to think clearly, speak concisely, and act confidently. Join the waitlist to get started.</p>
          <a class="button" href="../../contact.html">Get in touch to join the waitlist</a>
        </section>
        ${renderAnswerKey()}
      `;
      submitAssessmentResult(score);
    }

    gateForm.addEventListener('submit', async event => {
      event.preventDefault();
      if (!gateForm.checkValidity()) {
        gateForm.reportValidity();
        return;
      }
      startButton.disabled = true;
      startButton.textContent = 'Starting...';
      const formData = new FormData(gateForm);
      state.participant = {
        name: String(formData.get('name') || '').trim(),
        email: String(formData.get('email') || '').trim()
      };
      sessionStorage.setItem('find_your_level_name', state.participant.name);
      sessionStorage.setItem('find_your_level_email', state.participant.email);
      const payload = {
        name: state.participant.name,
        email: state.participant.email,
        role: String(formData.get('role') || '').trim(),
        message: String(formData.get('message') || '').trim(),
        page: 'find-your-level',
        source: 'find-your-level'
      };
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        });
        rememberContact(payload);
        await startExerciseForParticipant(state.participant);
      } catch (error) {
        startButton.disabled = false;
        startButton.textContent = 'Start the exercise';
        alert('We could not start the exercise. Please refresh and try again.');
      }
    });

    async function initializeFromSharedContact() {
      const profile = readContactProfile();
      if (!profile) return;
      try {
        await startExerciseForParticipant(profile);
      } catch (error) {
        console.warn('We could not reuse the saved contact session.', error);
      }
    }

    async function initialize() {
      const profile = readContactProfile();
      if (profile) {
        await initializeFromSharedContact();
        return;
      }
      if (!await adminLeadGateBypassEnabled()) return;
      const adminProfile = localAdminPreviewProfile() || await firebaseAdminPreviewProfile();
      if (!adminProfile) return;
      try {
        await startExerciseForParticipant(adminProfile, { adminPreview: true });
      } catch (error) {
        console.warn('Could not start admin preview without the data form.', error);
      }
    }

    initialize();
  </script>
  <script type="module" src="../../assets/feedback-widget.js?v=4"></script>
</body>
</html>
