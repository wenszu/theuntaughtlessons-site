<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logarithm Explorer — IB Mathematics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0c0e1a;
  --s1: #13162a;
  --s2: #191d33;
  --s3: #1f2440;
  --border: #272d4a;
  --blue: #4f8ef7;
  --blue-d: #1a3a8f;
  --blue-glow: rgba(79,142,247,0.25);
  --green: #2dd4a0;
  --green-d: #0a6648;
  --green-glow: rgba(45,212,160,0.2);
  --amber: #f5a623;
  --amber-d: #7a4e00;
  --amber-glow: rgba(245,166,35,0.2);
  --rose: #f06292;
  --rose-d: #7b1535;
  --purple: #b57bee;
  --purple-d: #4a1d8a;
  --text: #e4e8ff;
  --text2: #7d87b5;
  --text3: #3d4470;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* HEADER */
header {
  height: 58px;
  background: linear-gradient(90deg, #0f1228 0%, #151935 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 14px;
}
.logo {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: white;
}
header h1 { font-size: 16px; font-weight: 700; }
header p { font-size: 11px; color: var(--text2); margin-top: 1px; }
.ib-pill {
  margin-left: auto; background: linear-gradient(135deg, var(--blue-d), var(--purple-d));
  border: 1px solid rgba(79,142,247,0.4);
  color: var(--blue); font-size: 10px; font-weight: 700;
  letter-spacing: 1px; padding: 4px 12px; border-radius: 20px;
}

/* MODE BAR */
.modebar {
  display: flex; background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; gap: 2px;
}
.mbtn {
  padding: 11px 18px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--text2);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.18s; white-space: nowrap;
}
.mbtn.active { color: var(--green); border-bottom-color: var(--green); }
.mbtn:hover:not(.active) { color: var(--text); }

/* LAYOUT */
.app {
  display: flex;
  height: calc(100vh - 58px - 44px);
}

/* LEFT PANEL */
.left {
  width: 290px; flex-shrink: 0;
  background: var(--s1); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.card h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text3); margin-bottom: 12px;
}

/* Sliders */
.sl-group { margin-bottom: 12px; }
.sl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.sl-label { font-size: 13px; font-weight: 600; color: var(--text2); }
.sl-val {
  font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
  padding: 3px 10px; border-radius: 7px; min-width: 50px; text-align: right;
}
.sl-val.base { background: rgba(79,142,247,0.15); color: var(--blue); }
.sl-val.x    { background: rgba(45,212,160,0.15); color: var(--green); }

input[type=range] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range].base::-webkit-slider-thumb {
  -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
  background: var(--blue); cursor: pointer; box-shadow: 0 0 8px var(--blue-glow);
}
input[type=range].x::-webkit-slider-thumb {
  -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
  background: var(--green); cursor: pointer; box-shadow: 0 0 8px var(--green-glow);
}

/* Value rows */
.vrow {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 9px; gap: 8px;
}
.vrow-label { font-size: 13px; font-weight: 500; color: var(--text2); }
.vchip {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  padding: 3px 10px; border-radius: 7px; min-width: 80px; text-align: right;
}
.vchip.blue { background: rgba(79,142,247,0.12); color: var(--blue); border: 1px solid rgba(79,142,247,0.2); }
.vchip.green { background: rgba(45,212,160,0.12); color: var(--green); border: 1px solid rgba(45,212,160,0.2); }
.vchip.amber { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.vchip.rose  { background: rgba(240,98,146,0.12); color: var(--rose);  border: 1px solid rgba(240,98,146,0.2); }
.vchip.purple{ background: rgba(181,123,238,0.12); color: var(--purple);border: 1px solid rgba(181,123,238,0.2); }

/* Equation box */
.eq-box {
  background: var(--s3); border-radius: 10px; padding: 12px 14px;
  font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.9;
  color: var(--text2); margin-top: 4px;
}
.eq-box .hi { color: var(--text); font-weight: 500; }
.eq-box .blu { color: var(--blue); }
.eq-box .grn { color: var(--green); }
.eq-box .amb { color: var(--amber); }
.eq-box .ros { color: var(--rose); }
.eq-box .pur { color: var(--purple); }

/* Insight */
.insight {
  border-radius: 9px; padding: 10px 12px;
  font-size: 12px; font-weight: 500; line-height: 1.6;
  border-left: 3px solid; margin-top: 8px;
}
.insight.blue { background: rgba(79,142,247,0.08); color: #a8c4fc; border-color: var(--blue); }
.insight.green { background: rgba(45,212,160,0.08); color: #8ef5d8; border-color: var(--green); }
.insight.amber { background: rgba(245,166,35,0.08); color: #fcd58a; border-color: var(--amber); }
.insight.rose  { background: rgba(240,98,146,0.08); color: #f9b8cc; border-color: var(--rose); }

/* Law cards */
.law-card {
  background: var(--s3); border-radius: 10px; padding: 11px 13px;
  margin-bottom: 8px; border: 1px solid var(--border);
}
.law-card .law-name {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3); margin-bottom: 5px;
}
.law-card .law-formula {
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--amber);
  margin-bottom: 4px;
}
.law-card .law-example {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
}

/* Preset btns */
.presets { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.preset-btn {
  background: var(--s3); border: 1px solid var(--border);
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600; padding: 7px 6px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.preset-btn:hover { border-color: var(--green); color: var(--green); }

/* Practice */
.prob-box {
  background: var(--s3); border-radius: 10px; padding: 14px;
  text-align: center; margin-bottom: 12px;
}
.prob-box .prob-q {
  font-size: 10px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}
.prob-box .prob-eq {
  font-family: 'DM Mono', monospace; font-size: 19px; font-weight: 500; color: var(--text);
}
.ans-input {
  width: 100%; padding: 10px 14px; border-radius: 9px;
  border: 1.5px solid var(--border); background: var(--s3);
  font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500;
  color: var(--text); outline: none; text-align: center; margin-bottom: 9px;
  transition: border-color 0.15s;
}
.ans-input:focus { border-color: var(--green); }
.feedback {
  padding: 9px 14px; border-radius: 9px; font-size: 12px;
  font-weight: 600; text-align: center; display: none; margin-bottom: 9px;
}
.feedback.ok  { background: rgba(45,212,160,0.1); color: var(--green); border: 1px solid rgba(45,212,160,0.3); display: block; }
.feedback.err { background: rgba(240,98,146,0.1); color: var(--rose);  border: 1px solid rgba(240,98,146,0.3); display: block; }
.score-row { display: flex; gap: 8px; margin-bottom: 12px; }
.score-pill {
  flex: 1; text-align: center; padding: 7px; border-radius: 9px;
  font-size: 12px; font-weight: 700;
}
.score-pill.ok  { background: rgba(45,212,160,0.1); color: var(--green); }
.score-pill.err { background: rgba(240,98,146,0.1); color: var(--rose); }
.btn {
  display: block; width: 100%; padding: 10px; border-radius: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.15s; margin-bottom: 7px;
}
.btn-green { background: var(--green); color: #021f15; }
.btn-green:hover { background: #25c090; transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--green); color: var(--green); }

/* CANVAS */
.right {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
canvas { flex: 1; display: block; }

/* BOTTOM INFO */
.bottom {
  background: var(--s1); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
  padding: 12px 18px; flex-shrink: 0;
}
.bc {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 13px;
}
.bc .bt { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-bottom: 5px; }
.bc .bv { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); line-height: 1.7; }

/* INSTR BAR */
.instr {
  background: #0d1025; border-bottom: 1px solid var(--border);
  padding: 7px 20px; font-size: 11px; font-weight: 600;
  color: var(--text2); text-align: center; flex-shrink: 0;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">log</div>
  <div>
    <h1>Logarithm Explorer</h1>
    <p>The Inverse of Exponentials · IB Mathematics</p>
  </div>
  <div class="ib-pill">IB PREP</div>
</header>

<div class="modebar">
  <button class="mbtn active" onclick="setMode('concept')">① The Big Idea</button>
  <button class="mbtn" onclick="setMode('graph')">② Graph Explorer</button>
  <button class="mbtn" onclick="setMode('laws')">③ Log Laws</button>
  <button class="mbtn" onclick="setMode('natural')">④ Natural Log & e</button>
  <button class="mbtn" onclick="setMode('practice')">⑤ Practice</button>
</div>

<div class="app">
  <div class="left" id="left"></div>
  <div class="right">
    <div class="instr" id="instr"></div>
    <canvas id="cv"></canvas>
    <div class="bottom" id="bottom"></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let mode = 'concept';
let base = 2, xVal = 8;
let practice = { correct:0, wrong:0, current:null, answered:false };

// ── helpers ──────────────────────────────────────────────────────────────────
function fmt(n,d=3){ const r=Math.round(n*1000)/1000; return Number.isInteger(r)?r.toString():r.toFixed(d).replace(/\.?0+$/,''); }
function fmtBase(b){ return b===Math.E?'e':fmt(b,2); }
function logBase(b,x){ if(x<=0||b<=0||b===1) return NaN; return Math.log(x)/Math.log(b); }
function expBase(b,y){ return Math.pow(b,y); }

// ── mode switch ───────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.querySelectorAll('.mbtn').forEach((btn,i)=>{
    btn.classList.toggle('active',['concept','graph','laws','natural','practice'][i]===m);
  });
  updateAll();
}

// ── main update ───────────────────────────────────────────────────────────────
function updateAll(){ renderLeft(); renderBottom(); draw(); }

// ── LEFT PANEL ────────────────────────────────────────────────────────────────
function renderLeft(){
  const L=document.getElementById('left');
  if(mode==='concept')   L.innerHTML=leftConcept();
  else if(mode==='graph')L.innerHTML=leftGraph();
  else if(mode==='laws') L.innerHTML=leftLaws();
  else if(mode==='natural')L.innerHTML=leftNatural();
  else                   L.innerHTML=leftPractice();

  // re-bind sliders
  const sa=document.getElementById('sl-base');
  const sx=document.getElementById('sl-x');
  if(sa) sa.oninput=function(){ base=parseFloat(this.value); if(Math.abs(base-1)<0.05)base=1.05; document.getElementById('vbase').textContent=fmtBase(base); updateAll(); };
  if(sx) sx.oninput=function(){ xVal=parseFloat(this.value); document.getElementById('vx').textContent=fmt(xVal); updateAll(); };

  // practice bindings
  const inp=document.getElementById('ans-input');
  if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') checkAnswer(); };
}

function sliders(showBase=true, showX=true){
  let html='<div class="card"><h3>Controls</h3>';
  if(showBase) html+=`
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">Base (b)</span><span class="sl-val base" id="vbase">${fmtBase(base)}</span></div>
      <input type="range" class="base" id="sl-base" min="1.1" max="10" step="0.1" value="${base}">
    </div>`;
  if(showX) html+=`
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">x value</span><span class="sl-val x" id="vx">${fmt(xVal)}</span></div>
      <input type="range" class="x" id="sl-x" min="0.1" max="100" step="0.1" value="${xVal}">
    </div>`;
  html+='</div>';
  return html;
}

function leftConcept(){
  const lv=logBase(base,xVal), ev=expBase(base,lv);
  const bStr=fmtBase(base), xStr=fmt(xVal), lvStr=fmt(lv);
  return sliders()+`
  <div class="card">
    <h3>The Core Idea</h3>
    <div class="eq-box">
      <span class="blu">b</span><sup><span class="grn">y</span></sup> = <span class="amb">x</span><br>
      ⟺<br>
      log<sub><span class="blu">b</span></sub>(<span class="amb">x</span>) = <span class="grn">y</span>
    </div>
    <div class="insight blue" style="margin-top:10px">
      Logarithm answers: <b>"What power do I raise b to, to get x?"</b>
    </div>
  </div>

  <div class="card">
    <h3>With Your Numbers</h3>
    <div class="eq-box">
      <span class="blu">${bStr}</span><sup><span class="grn">${lvStr}</span></sup> = <span class="amb">${xStr}</span><br>
      ⟺<br>
      log<sub><span class="blu">${bStr}</span></sub>(<span class="amb">${xStr}</span>) = <span class="grn">${lvStr}</span>
    </div>
    <div class="vrow" style="margin-top:10px"><span class="vrow-label">Base b</span><span class="vchip blue">${bStr}</span></div>
    <div class="vrow"><span class="vrow-label">Argument x</span><span class="vchip amber">${xStr}</span></div>
    <div class="vrow"><span class="vrow-label">log<sub>${bStr}</sub>(${xStr}) =</span><span class="vchip green">${lvStr}</span></div>
    <div class="insight green">Read it aloud: "log base ${bStr} of ${xStr} equals ${lvStr}" means ${bStr} to the power ${lvStr} gives ${xStr}.</div>
  </div>`;
}

function leftGraph(){
  const lv=logBase(base,xVal);
  return sliders()+`
  <div class="card">
    <h3>Reading the Graph</h3>
    <div class="vrow"><span class="vrow-label">Base b</span><span class="vchip blue">${fmtBase(base)}</span></div>
    <div class="vrow"><span class="vrow-label">x</span><span class="vchip amber">${fmt(xVal)}</span></div>
    <div class="vrow"><span class="vrow-label">log<sub>${fmtBase(base)}</sub>(x) =</span><span class="vchip green">${fmt(lv)}</span></div>
    <div class="insight blue" style="margin-top:4px">The <b style="color:var(--blue)">blue</b> curve is y = b<sup>x</sup> (exponential).<br>The <b style="color:var(--green)">green</b> curve is y = log<sub>b</sub>(x) (logarithm).<br>They are <b>mirror images</b> across y = x.</div>
  </div>
  <div class="card">
    <h3>Key Features</h3>
    <div class="vrow"><span class="vrow-label">Domain</span><span class="vchip blue">x > 0 only</span></div>
    <div class="vrow"><span class="vrow-label">x-intercept</span><span class="vchip green">(1, 0) always</span></div>
    <div class="vrow"><span class="vrow-label">Vertical asymptote</span><span class="vchip rose">x = 0</span></div>
    <div class="insight amber" style="margin-top:4px">log<sub>b</sub>(1) = 0 <b>always</b>, for any base. Because b⁰ = 1.</div>
  </div>
  <div class="card">
    <h3>Presets</h3>
    <div class="presets">
      <button class="preset-btn" onclick="base=2;xVal=8;updateAll()">base 2</button>
      <button class="preset-btn" onclick="base=10;xVal=100;updateAll()">base 10</button>
      <button class="preset-btn" onclick="base=3;xVal=27;updateAll()">base 3</button>
      <button class="preset-btn" onclick="base=5;xVal=25;updateAll()">base 5</button>
    </div>
  </div>`;
}

function leftLaws(){
  const a=xVal, b2=Math.max(0.1,100-xVal);
  const bStr=fmtBase(base);
  const la=logBase(base,a), lb2=logBase(base,b2);
  const prod=logBase(base,a*b2), quot=logBase(base,a/b2), pw=logBase(base,Math.pow(a,3));
  return `
  <div class="card"><h3>Controls</h3>
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">Base (b)</span><span class="sl-val base" id="vbase">${bStr}</span></div>
      <input type="range" class="base" id="sl-base" min="1.1" max="10" step="0.1" value="${base}">
    </div>
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">Value M</span><span class="sl-val x" id="vx">${fmt(a)}</span></div>
      <input type="range" class="x" id="sl-x" min="0.5" max="50" step="0.5" value="${a}">
    </div>
  </div>
  <div class="card">
    <h3>Three Log Laws</h3>
    <div class="law-card">
      <div class="law-name">① Product Law</div>
      <div class="law-formula">log<sub>b</sub>(M·N) = log<sub>b</sub>(M) + log<sub>b</sub>(N)</div>
      <div class="law-example">log<sub>${bStr}</sub>(${fmt(a)}·${fmt(b2)}) = ${fmt(la)} + ${fmt(lb2)} = ${fmt(prod)}</div>
    </div>
    <div class="law-card">
      <div class="law-name">② Quotient Law</div>
      <div class="law-formula">log<sub>b</sub>(M/N) = log<sub>b</sub>(M) − log<sub>b</sub>(N)</div>
      <div class="law-example">log<sub>${bStr}</sub>(${fmt(a)}/${fmt(b2)}) = ${fmt(la)} − ${fmt(lb2)} = ${fmt(quot)}</div>
    </div>
    <div class="law-card">
      <div class="law-name">③ Power Law</div>
      <div class="law-formula">log<sub>b</sub>(M<sup>p</sup>) = p · log<sub>b</sub>(M)</div>
      <div class="law-example">log<sub>${bStr}</sub>(${fmt(a)}<sup>3</sup>) = 3 × ${fmt(la)} = ${fmt(pw)}</div>
    </div>
    <div class="insight amber">These three laws let you break apart or combine any logarithm. They are <b>essential</b> for IB exam questions.</div>
  </div>`;
}

function leftNatural(){
  const ev=Math.exp(xVal>10?Math.log(xVal):xVal>5?2:1);
  const lnVal=Math.log(xVal);
  return `
  <div class="card"><h3>Controls</h3>
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">x value</span><span class="sl-val x" id="vx">${fmt(xVal)}</span></div>
      <input type="range" class="x" id="sl-x" min="0.1" max="30" step="0.1" value="${xVal}">
    </div>
  </div>
  <div class="card">
    <h3>The Number e</h3>
    <div class="eq-box">
      e ≈ <span class="grn">2.71828...</span><br>
      It is irrational — like π<br>
      It is the <span class="blu">natural base</span>
    </div>
    <div class="insight blue" style="margin-top:8px">e appears naturally in growth, decay, finance, and calculus. It is the most important number in advanced mathematics.</div>
  </div>
  <div class="card">
    <h3>Natural Logarithm (ln)</h3>
    <div class="eq-box">
      ln(x) = log<sub><span class="grn">e</span></sub>(x)<br><br>
      ln(<span class="amb">${fmt(xVal)}</span>) = <span class="grn">${fmt(lnVal)}</span><br><br>
      e<sup><span class="grn">${fmt(lnVal)}</span></sup> = <span class="amb">${fmt(xVal)}</span>
    </div>
    <div class="vrow" style="margin-top:10px"><span class="vrow-label">ln(x)</span><span class="vchip green">${fmt(lnVal)}</span></div>
    <div class="vrow"><span class="vrow-label">e^ln(x)</span><span class="vchip amber">${fmt(Math.exp(lnVal))}</span></div>
  </div>
  <div class="card">
    <h3>Key ln Facts</h3>
    <div class="law-card">
      <div class="law-formula">ln(e) = 1</div>
      <div class="law-example">Because e¹ = e</div>
    </div>
    <div class="law-card">
      <div class="law-formula">ln(1) = 0</div>
      <div class="law-example">Because e⁰ = 1</div>
    </div>
    <div class="law-card">
      <div class="law-formula">e^ln(x) = x</div>
      <div class="law-example">They perfectly undo each other</div>
    </div>
    <div class="insight rose" style="margin-top:4px">ln and e<sup>x</sup> are inverse functions — they cancel each other out. This is used constantly in IB calculus.</div>
  </div>`;
}

function checkAnswer(){
  if(practice.answered) return;
  const inp=document.getElementById('ans-input');

  if(!inp||!fb) return;
  const v=parseFloat(inp.value);
  if(isNaN(v)){ fb.className='feedback err'; fb.textContent='Enter a number.'; return; }

// ── CANVAS DRAWING ────────────────────────────────────────────────────────────
let W,H,OX,OY,SC;

function setupCoords(){
  W=cv.width; H=cv.height;
  OX=W*0.38; OY=H*0.5;
  SC=Math.min(W,H)/12;
}

function tx(x){ return OX+x*SC; }
function ty(y){ return OY-y*SC; }
function fx(px){ return (px-OX)/SC; }
function fy(py){ return (OY-py)/SC; }

function drawGrid2(){
  ctx.strokeStyle='#1e2440'; ctx.lineWidth=1;
  const x0=Math.floor(fx(0)), x1=Math.ceil(fx(W));
  const y0=Math.floor(fy(H)), y1=Math.ceil(fy(0));
  for(let x=x0;x<=x1;x++){ctx.beginPath();ctx.moveTo(tx(x),0);ctx.lineTo(tx(x),H);ctx.stroke();}
  for(let y=y0;y<=y1;y++){ctx.beginPath();ctx.moveTo(0,ty(y));ctx.lineTo(W,ty(y));ctx.stroke();}
  ctx.strokeStyle='#2e3860'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tx(0),0);ctx.lineTo(tx(0),H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ty(0));ctx.lineTo(W,ty(0));ctx.stroke();
  // labels
  ctx.fillStyle='#2e3860'; ctx.font='10px DM Mono,monospace'; ctx.textAlign='center';
  for(let x=x0;x<=x1;x++){if(x===0)continue;const px=tx(x);if(px<10||px>W-10)continue;ctx.fillText(x,px,ty(0)+14);}
  ctx.textAlign='right';
  for(let y=y0;y<=y1;y++){if(y===0)continue;const py=ty(y);if(py<10||py>H-10)continue;ctx.fillText(y,tx(0)-5,py+4);}
}

function plotCurve(fn, color, lw=2.5){
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash([]);
  ctx.beginPath(); let started=false;
  for(let px=0;px<=W;px+=1.5){
    const x=fx(px), y=fn(x), py=ty(y);
    if(!isFinite(y)||isNaN(y)||py<-200||py>H+200){started=false;continue;}
    if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function drawPoint(x,y,color,label=''){
  const px=tx(x),py=ty(y);
  ctx.shadowColor=color; ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.shadowBlur=0;
  if(label){
    ctx.fillStyle=color; ctx.font='bold 12px DM Sans,sans-serif'; ctx.textAlign='left';
    ctx.fillText(label,px+9,py-6);
  }
}

function drawDashedLine(x1,y1,x2,y2,color='#2e3860'){
  ctx.strokeStyle=color; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(tx(x1),ty(y1));ctx.lineTo(tx(x2),ty(y2));ctx.stroke();
  ctx.setLineDash([]);
}

function draw(){
  setupCoords();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0c0e1a'; ctx.fillRect(0,0,W,H);
  drawGrid2();

  if(mode==='concept')    drawConcept();
  else if(mode==='graph') drawGraph();
  else if(mode==='laws')  drawLaws();
  else if(mode==='natural')drawNatural();
  else                    drawPractice();
}

function drawGraph(){
  const lv=logBase(base,xVal);
  // Mirror line y=x
  ctx.strokeStyle='rgba(80,90,160,0.35)'; ctx.lineWidth=1.5; ctx.setLineDash([6,6]);
  ctx.beginPath();
  const mn=Math.min(fx(0),fy(H)), mx=Math.max(fx(W),fy(0));
  ctx.moveTo(tx(mn),ty(mn));ctx.lineTo(tx(mx),ty(mx));
  ctx.stroke(); ctx.setLineDash([]);

  // Label mirror
  ctx.fillStyle='rgba(80,90,160,0.6)';ctx.font='11px DM Sans,sans-serif';ctx.textAlign='center';
  ctx.fillText('y = x', tx(3)+10, ty(3)-10);

  // Exponential
  plotCurve(x=>expBase(base,x),'#4f8ef7',2.5);
  // Log
  plotCurve(x=>logBase(base,x),'#2dd4a0',2.5);

  // Vertical asymptote
  ctx.strokeStyle='rgba(240,98,146,0.4)'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(tx(0),0);ctx.lineTo(tx(0),H);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(240,98,146,0.7)';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='left';
  ctx.fillText('asymptote x=0',tx(0)+4,20);

  // Key points
  drawPoint(1,0,'#2dd4a0','(1, 0) always');
  drawPoint(0,1,'#4f8ef7','(0, 1) always');

  // Hover point
  if(xVal>0.1){
    drawDashedLine(xVal,lv,xVal,0,'rgba(245,166,35,0.35)');
    drawDashedLine(xVal,lv,0,lv,'rgba(245,166,35,0.35)');
    drawPoint(xVal,lv,'#f5a623',`(${fmt(xVal,1)}, ${fmt(lv,2)})`);
  }

  // Labels
  ctx.fillStyle='#4f8ef7'; ctx.font='bold 12px DM Sans,sans-serif'; ctx.textAlign='left';
  ctx.fillText(`y = ${fmtBase(base)}^x`, tx(1.2), ty(expBase(base,1.5))-8);
  ctx.fillStyle='#2dd4a0';
  ctx.fillText(`y = log_${fmtBase(base)}(x)`, tx(3), ty(logBase(base,3))-10);
}

function drawLaws(){
  const M=xVal, N=Math.max(0.5,30-xVal*0.5);
  const lM=logBase(base,M), lN=logBase(base,N);
  const lMN=logBase(base,M*N);

  // Log curve
  plotCurve(x=>logBase(base,x),'rgba(45,212,160,0.3)',1.5);

  // Show product law visually: lM + lN = lMN on the number line / curve
  if(M>0&&N>0&&M*N<10000){
    // Draw points for M, N, M*N on the curve
    drawDashedLine(M,lM,M,0,'rgba(79,142,247,0.4)');
    drawDashedLine(N,lN,N,0,'rgba(181,123,238,0.4)');
    drawDashedLine(M*N,lMN,M*N,0,'rgba(245,166,35,0.4)');
    drawDashedLine(0,lM,M,lM,'rgba(79,142,247,0.3)');
    drawDashedLine(0,lN,N,lN,'rgba(181,123,238,0.3)');
    drawDashedLine(0,lMN,M*N>fx(W)?fx(W):M*N,lMN,'rgba(245,166,35,0.3)');

    if(M<fx(W)) drawPoint(M,lM,'#4f8ef7',`M=${fmt(M,1)}`);
    if(N<fx(W)) drawPoint(N,lN,'#b57bee',`N=${fmt(N,1)}`);
    if(M*N<fx(W)) drawPoint(M*N,lMN,'#f5a623',`M·N=${fmt(M*N,1)}`);
  }

  plotCurve(x=>logBase(base,x),'#2dd4a0',2.5);

  // Info box
  const bx=W*0.55, by=30;
  ctx.fillStyle='rgba(19,22,42,0.9)';
  ctx.beginPath();ctx.roundRect(bx,by,W*0.41,130,10);ctx.fill();
  ctx.strokeStyle=var_border();ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(bx,by,W*0.41,130,10);ctx.stroke();

  ctx.textAlign='left';
  ctx.font='bold 11px DM Mono,monospace';
  ctx.fillStyle='#7d87b5'; ctx.fillText('Product Law Live:', bx+12, by+22);
  ctx.fillStyle='#4f8ef7'; ctx.fillText(`log(${fmt(M,1)}) = ${fmt(lM)}`, bx+12, by+44);
  ctx.fillStyle='#b57bee'; ctx.fillText(`log(${fmt(N,1)}) = ${fmt(lN)}`, bx+12, by+64);
  ctx.fillStyle='#7d87b5'; ctx.fillText('Sum =', bx+12, by+84);
  ctx.fillStyle='#f5a623'; ctx.fillText(`${fmt(lM)} + ${fmt(lN)} = ${fmt(lM+lN)}`, bx+60, by+84);
  ctx.fillStyle='#7d87b5'; ctx.fillText('log(M·N) =', bx+12, by+104);
  ctx.fillStyle='#2dd4a0'; ctx.fillText(fmt(lMN), bx+105, by+104);
  const match=Math.abs(lM+lN-lMN)<0.01;
  ctx.fillStyle=match?'#2dd4a0':'#f06292';
  ctx.fillText(match?'✓ Equal!':'≈ Check rounding',bx+12,by+122);
}

window.addEventListener('resize',resize);
window.addEventListener('load',()=>{ setTimeout(()=>{ resize(); updateAll(); },60); });
</script>
