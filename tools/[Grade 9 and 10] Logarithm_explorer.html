<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logarithm Explorer — Grade 9–10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0c0e1a;
  --s1: #13162a;
  --s2: #191d33;
  --s3: #1f2440;
  --border: #272d4a;
  --blue: #4f8ef7;
  --blue-d: #1a3a8f;
  --blue-glow: rgba(79,142,247,0.25);
  --green: #2dd4a0;
  --green-d: #0a6648;
  --green-glow: rgba(45,212,160,0.2);
  --amber: #f5a623;
  --amber-d: #7a4e00;
  --amber-glow: rgba(245,166,35,0.2);
  --rose: #f06292;
  --rose-d: #7b1535;
  --purple: #b57bee;
  --purple-d: #4a1d8a;
  --text: #e4e8ff;
  --text2: #7d87b5;
  --text3: #3d4470;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* HEADER */
header {
  height: 58px;
  background: linear-gradient(90deg, #0f1228 0%, #151935 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 14px;
}
.logo {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: white;
}
header h1 { font-size: 16px; font-weight: 700; }
header p { font-size: 11px; color: var(--text2); margin-top: 1px; }
.ib-pill {
  margin-left: auto; background: linear-gradient(135deg, var(--blue-d), var(--purple-d));
  border: 1px solid rgba(79,142,247,0.4);
  color: var(--blue); font-size: 10px; font-weight: 700;
  letter-spacing: 1px; padding: 4px 12px; border-radius: 20px;
}

/* MODE BAR */
.modebar {
  display: flex; background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; gap: 2px;
}
.mbtn {
  padding: 11px 16px; font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; color: var(--text2);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.18s; white-space: nowrap;
}
.mbtn.active { color: var(--green); border-bottom-color: var(--green); }
.mbtn:hover:not(.active) { color: var(--text); }

/* LAYOUT */
.app {
  display: flex;
  height: calc(100vh - 58px - 44px);
}

/* LEFT PANEL */
.left {
  width: 290px; flex-shrink: 0;
  background: var(--s1); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}

.card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.card h3 {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text3); margin-bottom: 12px;
}

/* Sliders */
.sl-group { margin-bottom: 12px; }
.sl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.sl-label { font-size: 13px; font-weight: 600; color: var(--text2); }
.sl-val {
  font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
  padding: 3px 10px; border-radius: 7px; min-width: 50px; text-align: right;
}
.sl-val.base { background: rgba(79,142,247,0.15); color: var(--blue); }
.sl-val.x    { background: rgba(45,212,160,0.15); color: var(--green); }

input[type=range] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range].base::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--blue); cursor: pointer; box-shadow: 0 0 8px var(--blue-glow);
}
input[type=range].x::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--green); cursor: pointer; box-shadow: 0 0 8px var(--green-glow);
}

/* Value rows */
.vrow {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 9px; gap: 8px;
}
.vrow-label { font-size: 13px; font-weight: 500; color: var(--text2); }
.vchip {
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  padding: 3px 10px; border-radius: 7px; min-width: 80px; text-align: right;
}
.vchip.blue { background: rgba(79,142,247,0.12); color: var(--blue); border: 1px solid rgba(79,142,247,0.2); }
.vchip.green { background: rgba(45,212,160,0.12); color: var(--green); border: 1px solid rgba(45,212,160,0.2); }
.vchip.amber { background: rgba(245,166,35,0.12); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.vchip.rose  { background: rgba(240,98,146,0.12); color: var(--rose);  border: 1px solid rgba(240,98,146,0.2); }
.vchip.purple{ background: rgba(181,123,238,0.12); color: var(--purple);border: 1px solid rgba(181,123,238,0.2); }

/* Equation box */
.eq-box {
  background: var(--s3); border-radius: 10px; padding: 12px 14px;
  font-family: 'DM Mono', monospace; font-size: 13px; line-height: 2;
  color: var(--text2); margin-top: 4px;
}
.eq-box .hi { color: var(--text); font-weight: 500; }
.eq-box .blu { color: var(--blue); }
.eq-box .grn { color: var(--green); }
.eq-box .amb { color: var(--amber); }
.eq-box .ros { color: var(--rose); }
.eq-box .pur { color: var(--purple); }

/* Insight */
.insight {
  border-radius: 9px; padding: 10px 12px;
  font-size: 13px; font-weight: 500; line-height: 1.6;
  border-left: 3px solid; margin-top: 8px;
}
.insight.blue { background: rgba(79,142,247,0.08); color: #a8c4fc; border-color: var(--blue); }
.insight.green { background: rgba(45,212,160,0.08); color: #8ef5d8; border-color: var(--green); }
.insight.amber { background: rgba(245,166,35,0.08); color: #fcd58a; border-color: var(--amber); }
.insight.rose  { background: rgba(240,98,146,0.08); color: #f9b8cc; border-color: var(--rose); }
.insight.purple { background: rgba(181,123,238,0.08); color: #d4b0f7; border-color: var(--purple); }

/* Law cards */
.law-card {
  background: var(--s3); border-radius: 10px; padding: 11px 13px;
  margin-bottom: 8px; border: 1px solid var(--border);
}
.law-card .law-name {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text3); margin-bottom: 5px;
}
.law-card .law-formula {
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--amber);
  margin-bottom: 4px;
}
.law-card .law-example {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
  margin-bottom: 4px;
}
.law-card .law-plain {
  font-size: 12px; color: var(--green); font-style: italic;
}

/* Preset btns */
.presets { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.preset-btn {
  background: var(--s3); border: 1px solid var(--border);
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; padding: 8px 6px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.preset-btn:hover { border-color: var(--green); color: var(--green); }

/* Practice */
.prob-box {
  background: var(--s3); border-radius: 10px; padding: 14px;
  text-align: center; margin-bottom: 12px;
}
.prob-box .prob-q {
  font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 6px;
}
.prob-box .prob-eq {
  font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text);
}
.ans-input {
  width: 100%; padding: 10px 14px; border-radius: 9px;
  border: 1.5px solid var(--border); background: var(--s3);
  font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500;
  color: var(--text); outline: none; text-align: center; margin-bottom: 9px;
  transition: border-color 0.15s;
}
.ans-input:focus { border-color: var(--green); }
.feedback {
  padding: 9px 14px; border-radius: 9px; font-size: 13px;
  font-weight: 600; text-align: center; display: none; margin-bottom: 9px;
}
.feedback.ok  { background: rgba(45,212,160,0.1); color: var(--green); border: 1px solid rgba(45,212,160,0.3); display: block; }
.feedback.err { background: rgba(240,98,146,0.1); color: var(--rose);  border: 1px solid rgba(240,98,146,0.3); display: block; }
.score-row { display: flex; gap: 8px; margin-bottom: 12px; }
.score-pill {
  flex: 1; text-align: center; padding: 8px; border-radius: 9px;
  font-size: 13px; font-weight: 700;
}
.score-pill.ok  { background: rgba(45,212,160,0.1); color: var(--green); }
.score-pill.err { background: rgba(240,98,146,0.1); color: var(--rose); }
.btn {
  display: block; width: 100%; padding: 11px; border-radius: 9px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.15s; margin-bottom: 7px;
}
.btn-green { background: var(--green); color: #021f15; }
.btn-green:hover { background: #25c090; transform: translateY(-1px); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--green); color: var(--green); }

/* CANVAS */
.right {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
canvas { flex: 1; display: block; }

/* BOTTOM INFO */
.bottom {
  background: var(--s1); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
  padding: 12px 18px; flex-shrink: 0;
}
.bc {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 13px;
}
.bc .bt { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-bottom: 5px; }
.bc .bv { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); line-height: 1.7; }

/* INSTR BAR */
.instr {
  background: #0d1025; border-bottom: 1px solid var(--border);
  padding: 7px 20px; font-size: 12px; font-weight: 600;
  color: var(--text2); text-align: center; flex-shrink: 0;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">log</div>
  <div>
    <h1>Logarithm Explorer</h1>
    <p>Understand logarithms step by step — Grade 9–10</p>
  </div>
  <div class="ib-pill">GRADE 9–10</div>
</header>

<div class="modebar">
  <button class="mbtn active" onclick="setMode('concept')">① What's a Log?</button>
  <button class="mbtn" onclick="setMode('graph')">② See the Graph</button>
  <button class="mbtn" onclick="setMode('laws')">③ Log Rules</button>
  <button class="mbtn" onclick="setMode('natural')">④ The Number e</button>
  <button class="mbtn" onclick="setMode('practice')">⑤ Practice!</button>
</div>

<div class="app">
  <div class="left" id="left"></div>
  <div class="right">
    <div class="instr" id="instr"></div>
    <canvas id="cv"></canvas>
    <div class="bottom" id="bottom"></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let mode = 'concept';
let base = 2, xVal = 8;
let practice = { correct:0, wrong:0, current:null, answered:false };

// ── helpers ──────────────────────────────────────────────────────────────────
function fmt(n,d=3){ const r=Math.round(n*1000)/1000; return Number.isInteger(r)?r.toString():r.toFixed(d).replace(/\.?0+$/,''); }
function fmtBase(b){ return b===Math.E?'e':fmt(b,2); }
function logBase(b,x){ if(x<=0||b<=0||b===1) return NaN; return Math.log(x)/Math.log(b); }
function expBase(b,y){ return Math.pow(b,y); }

// ── mode switch ───────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.querySelectorAll('.mbtn').forEach((btn,i)=>{
    btn.classList.toggle('active',['concept','graph','laws','natural','practice'][i]===m);
  });
  updateAll();
}

// ── main update ───────────────────────────────────────────────────────────────
function updateAll(){ renderLeft(); renderBottom(); draw(); }

// ── LEFT PANEL ────────────────────────────────────────────────────────────────
function renderLeft(){
  const L=document.getElementById('left');
  if(mode==='concept')   L.innerHTML=leftConcept();
  else if(mode==='graph')L.innerHTML=leftGraph();
  else if(mode==='laws') L.innerHTML=leftLaws();
  else if(mode==='natural')L.innerHTML=leftNatural();
  else                   L.innerHTML=leftPractice();

  const sa=document.getElementById('sl-base');
  const sx=document.getElementById('sl-x');
  if(sa) sa.oninput=function(){ base=parseFloat(this.value); if(Math.abs(base-1)<0.05)base=1.05; document.getElementById('vbase').textContent=fmtBase(base); updateAll(); };
  if(sx) sx.oninput=function(){ xVal=parseFloat(this.value); document.getElementById('vx').textContent=fmt(xVal); updateAll(); };

  const inp=document.getElementById('ans-input');
  if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') checkAnswer(); };
}

function sliders(showBase=true, showX=true){
  let html='<div class="card"><h3>Controls — Drag to Explore</h3>';
  if(showBase) html+=`
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">Base (b) — the bottom number</span><span class="sl-val base" id="vbase">${fmtBase(base)}</span></div>
      <input type="range" class="base" id="sl-base" min="1.1" max="10" step="0.1" value="${base}">
    </div>`;
  if(showX) html+=`
    <div class="sl-group">
      <div class="sl-header"><span class="sl-label">x value — what we're asking about</span><span class="sl-val x" id="vx">${fmt(xVal)}</span></div>
      <input type="range" class="x" id="sl-x" min="0.1" max="100" step="0.1" value="${xVal}">
    </div>`;
  html+='</div>';
  return html;
}

function leftConcept(){
  const lv=logBase(base,xVal), ev=expBase(base,lv);
  const bStr=fmtBase(base), xStr=fmt(xVal), lvStr=fmt(lv);
  const puzzle = base===2&&xVal===8 ? '2 × 2 × 2 = 8, so the answer is 3!'
    : base===2&&xVal===4 ? '2 × 2 = 4, so the answer is 2!'
    : base===10&&xVal===100 ? '10 × 10 = 100, so the answer is 2!'
    : base===3&&xVal===27 ? '3 × 3 × 3 = 27, so the answer is 3!'
    : `${bStr} to the power ${lvStr} gives ${xStr}`;
  return `
  <div class="card">
    <h3>What is a Logarithm?</h3>
    <p style="font-size:13px;line-height:1.75;color:var(--text2)">You already know how powers work:</p>
    <div class="eq-box" style="margin-top:8px;text-align:center">
      2<sup>1</sup> = 2 &nbsp;&nbsp;&nbsp; 2<sup>2</sup> = 4 &nbsp;&nbsp;&nbsp; 2<sup>3</sup> = 8 &nbsp;&nbsp;&nbsp; 2<sup>4</sup> = 16
    </div>
    <p style="font-size:13px;line-height:1.75;color:var(--text2);margin-top:10px">A logarithm reverses this. Instead of asking <em>"what do you get when you raise 2 to the power 3?"</em>, it asks:</p>
    <div class="insight blue" style="margin-top:8px"><b>"2 to what power gives 8?"</b><br>The answer is 3. That is what log₂(8) = 3 means.</div>
    <p style="font-size:13px;line-height:1.75;color:var(--text2);margin-top:10px">The logarithm <strong>is the exponent</strong> — it tells you the power you need.</p>
  </div>
  <div class="card">
    <h3>The Three Parts</h3>
    <div class="eq-box" style="text-align:center;font-size:15px">
      log<sub><span class="blu">b</span></sub>(<span class="amb">x</span>) = <span class="grn">y</span>
    </div>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:7px">
      <div class="vrow"><span class="vrow-label"><span class="blu">b</span> — base</span><span class="vchip blue">the bottom number</span></div>
      <div class="vrow"><span class="vrow-label"><span class="amb">x</span> — argument</span><span class="vchip amber">what you're logging</span></div>
      <div class="vrow"><span class="vrow-label"><span class="grn">y</span> — logarithm</span><span class="vchip green">the power (the answer)</span></div>
    </div>
    <div class="insight amber" style="margin-top:10px">This is the same as writing <span class="blu">b</span><sup><span class="grn">y</span></sup> = <span class="amb">x</span>. Both forms say the exact same thing — just arranged differently.</div>
  </div>
  <div class="card">
    <h3>Where Logarithms Appear</h3>
    <p style="font-size:13px;line-height:1.9;color:var(--text2)">
      Sound — decibels measure loudness (your ears hear logarithmically)<br>
      Earthquakes — the Richter scale uses log base 10<br>
      Chemistry — pH measures how acidic a liquid is<br>
      Finance — compound interest and population growth<br>
      Music — octaves follow a logarithmic pattern
    </p>
  </div>
  <div style="text-align:center;padding:12px 0 4px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase">— try it yourself —</div>
  <div class="card">
    <h3>The Big Idea</h3>
    <div class="insight blue"><b>Question:</b> ${bStr} to what power gives ${xStr}?<br><br><b>Answer: ${lvStr}</b> &nbsp;—&nbsp; ${puzzle}</div>
    <div class="insight green" style="margin-top:8px">Drag the sliders below to change the numbers and see this relationship update live.</div>
  </div>
  ${sliders()}
  <div class="card">
    <h3>The Two Forms</h3>
    <div class="eq-box">
      <span class="blu">${bStr}</span><sup><span class="grn">${lvStr}</span></sup> = <span class="amb">${xStr}</span><br>
      <span style="color:var(--text3)">← exponential form</span><br><br>
      log<sub><span class="blu">${bStr}</span></sub>(<span class="amb">${xStr}</span>) = <span class="grn">${lvStr}</span><br>
      <span style="color:var(--text3)">← logarithm form (same thing)</span>
    </div>
    <div class="insight amber" style="margin-top:10px">These mean <b>exactly the same thing</b>. Switching between them is the core skill to practise.</div>
  </div>
  <div class="card">
    <h3>In Numbers</h3>
    <div class="vrow"><span class="vrow-label">Base b =</span><span class="vchip blue">${bStr}</span></div>
    <div class="vrow"><span class="vrow-label">Argument x =</span><span class="vchip amber">${xStr}</span></div>
    <div class="vrow"><span class="vrow-label">log<sub>${bStr}</sub>(${xStr}) =</span><span class="vchip green">${lvStr}</span></div>
    <div class="insight green" style="margin-top:4px">Read it as: "${bStr} to the power ${lvStr} gives ${xStr}."</div>
  </div>`;
}

function leftGraph(){
  const lv=logBase(base,xVal);
  return `
  <div class="card">
    <h3>About This Section</h3>
    <p style="font-size:13px;line-height:1.75;color:var(--text2)">This graph plots y = log<sub>b</sub>(x) (green) alongside y = b<sup>x</sup> (blue). They are always mirror images of each other across the line y = x — because logarithms and exponentials are inverse operations.<br><br>Drag the <b>base</b> slider to reshape both curves. Drag <b>x</b> to read the log value at any point.</p>
  </div>
  `+sliders()+`
  <div class="card">
    <h3>Reading the Graph</h3>
    <div class="vrow"><span class="vrow-label">Base b</span><span class="vchip blue">${fmtBase(base)}</span></div>
    <div class="vrow"><span class="vrow-label">x</span><span class="vchip amber">${fmt(xVal)}</span></div>
    <div class="vrow"><span class="vrow-label">log<sub>${fmtBase(base)}</sub>(x) =</span><span class="vchip green">${fmt(lv)}</span></div>
    <div class="insight blue" style="margin-top:4px">The <b style="color:var(--blue)">blue</b> curve is y = b<sup>x</sup> (exponential).<br>The <b style="color:var(--green)">green</b> curve is y = log<sub>b</sub>(x) (logarithm).<br>They are <b>mirror images</b> — flip one across the dashed line y = x and you get the other!</div>
  </div>
  <div class="card">
    <h3>Key Features Explained</h3>
    <div class="vrow"><span class="vrow-label">Works for...</span><span class="vchip blue">x &gt; 0 only</span></div>
    <div class="insight blue" style="margin-top:2px">You can't take the log of 0 or a negative number — the curve simply doesn't exist there. Try it on a calculator: log(−1) gives an error!</div>
    <div class="vrow" style="margin-top:8px"><span class="vrow-label">Always crosses</span><span class="vchip green">(1, 0)</span></div>
    <div class="insight green" style="margin-top:2px">log<sub>b</sub>(1) = 0 for any base, because any number to the power 0 equals 1.</div>
    <div class="vrow" style="margin-top:8px"><span class="vrow-label">Approaches but never crosses</span><span class="vchip rose">x = 0</span></div>
    <div class="insight rose" style="margin-top:2px">The curve gets closer and closer to x = 0 but never touches it — like a wall. This is called a <b>vertical asymptote</b>.</div>
  </div>
  <div class="card">
    <h3>Try These!</h3>
    <div class="presets">
      <button class="preset-btn" onclick="base=2;xVal=8;updateAll()">base 2</button>
      <button class="preset-btn" onclick="base=10;xVal=100;updateAll()">base 10</button>

function leftLaws(){

  const prod=logBase(base,a*b2), quot=logBase(base,a/b2), pw=logBase(base,Math.pow(a,3));
  return `
  <div class="card">
    <h3>About This Section</h3>
    <p style="font-size:13px;line-height:1.75;color:var(--text2)">There are three rules that let you break apart or combine any logarithm expression. They appear in almost every exam question involving logs.<br><br>Drag the sliders to change the numbers and watch all three rules update in real time with actual values.</p>

      <div class="law-name">① Product Rule</div>
      <div class="law-formula">log<sub>b</sub>(M·N) = log<sub>b</sub>(M) + log<sub>b</sub>(N)</div>
      <div class="law-example">log<sub>${bStr}</sub>(${fmt(a)}·${fmt(b2)}) = ${fmt(la)} + ${fmt(lb2)} = ${fmt(prod)}</div>
      <div class="law-plain">In plain English: multiplying numbers → add their logs</div>
    </div>
    <div class="law-card">
      <div class="law-name">② Quotient Rule</div>

      <div class="law-example">log<sub>${bStr}</sub>(${fmt(a)}/${fmt(b2)}) = ${fmt(la)} − ${fmt(lb2)} = ${fmt(quot)}</div>

function checkAnswer(){
  if(practice.answered) return;
  const inp=document.getElementById('ans-input');

  if(!inp||!fb) return;
  const v=parseFloat(inp.value);
  if(isNaN(v)){ fb.className='feedback err'; fb.textContent='Type a number first!'; return; }
  const pr=practice.current;
  if(Math.abs(v-pr.a)<0.05){

    fb.className='feedback ok';

}

// ── CANVAS DRAWING ────────────────────────────────────────────────────────────
let W,H,OX,OY,SC;

function setupCoords(){
  W=cv.width; H=cv.height;
  OX=W*0.38; OY=H*0.5;
  SC=Math.min(W,H)/12;
}

function tx(x){ return OX+x*SC; }
function ty(y){ return OY-y*SC; }
function fx(px){ return (px-OX)/SC; }
function fy(py){ return (OY-py)/SC; }

function drawGrid2(){
  ctx.strokeStyle='#1e2440'; ctx.lineWidth=1;
  const x0=Math.floor(fx(0)), x1=Math.ceil(fx(W));
  const y0=Math.floor(fy(H)), y1=Math.ceil(fy(0));
  for(let x=x0;x<=x1;x++){ctx.beginPath();ctx.moveTo(tx(x),0);ctx.lineTo(tx(x),H);ctx.stroke();}
  for(let y=y0;y<=y1;y++){ctx.beginPath();ctx.moveTo(0,ty(y));ctx.lineTo(W,ty(y));ctx.stroke();}
  ctx.strokeStyle='#2e3860'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tx(0),0);ctx.lineTo(tx(0),H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ty(0));ctx.lineTo(W,ty(0));ctx.stroke();
  ctx.fillStyle='#2e3860'; ctx.font='10px DM Mono,monospace'; ctx.textAlign='center';
  for(let x=x0;x<=x1;x++){if(x===0)continue;const px=tx(x);if(px<10||px>W-10)continue;ctx.fillText(x,px,ty(0)+14);}
  ctx.textAlign='right';
  for(let y=y0;y<=y1;y++){if(y===0)continue;const py=ty(y);if(py<10||py>H-10)continue;ctx.fillText(y,tx(0)-5,py+4);}
}

function plotCurve(fn, color, lw=2.5){
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash([]);
  ctx.beginPath(); let started=false;
  for(let px=0;px<=W;px+=1.5){
    const x=fx(px), y=fn(x), py=ty(y);
    if(!isFinite(y)||isNaN(y)||py<-200||py>H+200){started=false;continue;}
    if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function drawPoint(x,y,color,label=''){
  const px=tx(x),py=ty(y);
  ctx.shadowColor=color; ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.shadowBlur=0;
  if(label){
    ctx.fillStyle=color; ctx.font='bold 12px DM Sans,sans-serif'; ctx.textAlign='left';
    ctx.fillText(label,px+9,py-6);
  }
}

function drawDashedLine(x1,y1,x2,y2,color='#2e3860'){
  ctx.strokeStyle=color; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(tx(x1),ty(y1));ctx.lineTo(tx(x2),ty(y2));ctx.stroke();
  ctx.setLineDash([]);
}

function draw(){
  setupCoords();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0c0e1a'; ctx.fillRect(0,0,W,H);
  drawGrid2();

  if(mode==='concept')    drawConcept();
  else if(mode==='graph') drawGraph();
  else if(mode==='laws')  drawLaws();
  else if(mode==='natural')drawNatural();
  else                    drawPractice();
}

function drawGraph(){

  ctx.fillText(`y = ${fmtBase(base)}^x`, tx(1.2), ty(expBase(base,1.5))-8);

  ctx.fillText(`y = log_${fmtBase(base)}(x)`, tx(3), ty(logBase(base,3))-10);

function drawLaws(){
  const M=xVal, N=Math.max(0.5,30-xVal*0.5);
  const lM=logBase(base,M), lN=logBase(base,N);
  const lMN=logBase(base,M*N);

  plotCurve(x=>logBase(base,x),'rgba(45,212,160,0.3)',1.5);

  if(M>0&&N>0&&M*N<10000){
    drawDashedLine(M,lM,M,0,'rgba(79,142,247,0.4)');
    drawDashedLine(N,lN,N,0,'rgba(181,123,238,0.4)');
    drawDashedLine(M*N,lMN,M*N,0,'rgba(245,166,35,0.4)');
    drawDashedLine(0,lM,M,lM,'rgba(79,142,247,0.3)');
    drawDashedLine(0,lN,N,lN,'rgba(181,123,238,0.3)');
    drawDashedLine(0,lMN,M*N>fx(W)?fx(W):M*N,lMN,'rgba(245,166,35,0.3)');

    if(M<fx(W)) drawPoint(M,lM,'#4f8ef7',`M=${fmt(M,1)}`);
    if(N<fx(W)) drawPoint(N,lN,'#b57bee',`N=${fmt(N,1)}`);
    if(M*N<fx(W)) drawPoint(M*N,lMN,'#f5a623',`M·N=${fmt(M*N,1)}`);
  }

  plotCurve(x=>logBase(base,x),'#2dd4a0',2.5);

  const bx=W*0.55, by=30;
  ctx.fillStyle='rgba(19,22,42,0.9)';
  ctx.beginPath();ctx.roundRect(bx,by,W*0.41,130,10);ctx.fill();
  ctx.strokeStyle='#272d4a';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(bx,by,W*0.41,130,10);ctx.stroke();

  ctx.textAlign='left';
  ctx.font='bold 11px DM Mono,monospace';
  ctx.fillStyle='#7d87b5'; ctx.fillText('Product Rule Live:', bx+12, by+22);
  ctx.fillStyle='#4f8ef7'; ctx.fillText(`log(${fmt(M,1)}) = ${fmt(lM)}`, bx+12, by+44);
  ctx.fillStyle='#b57bee'; ctx.fillText(`log(${fmt(N,1)}) = ${fmt(lN)}`, bx+12, by+64);
  ctx.fillStyle='#7d87b5'; ctx.fillText('Sum =', bx+12, by+84);
  ctx.fillStyle='#f5a623'; ctx.fillText(`${fmt(lM)} + ${fmt(lN)} = ${fmt(lM+lN)}`, bx+60, by+84);
  ctx.fillStyle='#7d87b5'; ctx.fillText('log(M·N) =', bx+12, by+104);
  ctx.fillStyle='#2dd4a0'; ctx.fillText(fmt(lMN), bx+105, by+104);
  const match=Math.abs(lM+lN-lMN)<0.01;
  ctx.fillStyle=match?'#2dd4a0':'#f06292';
  ctx.fillText(match?'✓ They match!':'≈ Check rounding',bx+12,by+122);
}

function var_border(){ return '#272d4a'; }

function drawNatural(){
  const lnVal=Math.log(xVal);
  plotCurve(x=>Math.exp(x),'rgba(79,142,247,0.5)',2);
  plotCurve(x=>Math.log(x),'rgba(45,212,160,0.5)',2);
  ctx.strokeStyle='rgba(60,70,100,0.3)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(W,0);ctx.stroke();ctx.setLineDash([]);

  drawPoint(1,Math.E,'#4f8ef7','(1, e)');
  drawPoint(Math.E,1,'#2dd4a0','(e, 1)');
  drawPoint(0,1,'#4f8ef7','(0,1)');
  drawPoint(1,0,'#2dd4a0','(1,0)');

  if(xVal>0.05){
    drawDashedLine(xVal,lnVal,xVal,0,'rgba(245,166,35,0.35)');
    drawDashedLine(xVal,lnVal,0,lnVal,'rgba(245,166,35,0.35)');
    drawPoint(xVal,lnVal,'#f5a623',`ln(${fmt(xVal,1)})=${fmt(lnVal)}`);
  }

  ctx.fillStyle='#4f8ef7';ctx.font='bold 12px DM Sans,sans-serif';ctx.textAlign='left';
  ctx.fillText('y = eˣ',tx(0.5),ty(Math.exp(0.5))-10);
  ctx.fillStyle='#2dd4a0';
  ctx.fillText('y = ln(x)',tx(4),ty(Math.log(4))-10);

  ctx.strokeStyle='rgba(181,123,238,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(tx(Math.E),ty(0)-5);ctx.lineTo(tx(Math.E),ty(0)+5);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#b57bee';ctx.font='10px DM Mono,monospace';ctx.textAlign='center';
  ctx.fillText('e',tx(Math.E),ty(0)+17);
}

function drawPractice(){
  ctx.fillStyle='#0c0e1a';ctx.fillRect(0,0,W,H);
  if(!practice.current) return;
  const pr=practice.current;

  ctx.textAlign='center';
  ctx.fillStyle='#1e2440';
  ctx.beginPath();ctx.roundRect(W*0.15,H*0.1,W*0.7,H*0.5,16);ctx.fill();
  ctx.strokeStyle='#272d4a';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(W*0.15,H*0.1,W*0.7,H*0.5,16);ctx.stroke();

  ctx.fillStyle='#2e3860';
  ctx.font='bold 13px DM Sans,sans-serif';
  ctx.fillText('Ask: base to what power = argument?',W/2,H*0.18);

  ctx.fillStyle='#e4e8ff';
  ctx.font='bold 36px DM Mono,monospace';
  ctx.fillText(pr.q,W/2,H*0.35);

  ctx.fillStyle='#3d4470';
  ctx.font='13px DM Sans,sans-serif';
  ctx.fillText(`💡 ${pr.hint}`,W/2,H*0.48);

  ctx.fillStyle='#1a2050';
  ctx.beginPath();ctx.roundRect(W*0.2,H*0.67,W*0.6,H*0.25,12);ctx.fill();
  ctx.fillStyle='#2e3860';ctx.font='bold 11px DM Sans,sans-serif';
  ctx.fillText('Remember: log_b(x) = y  ⟺  b^y = x',W/2,H*0.76);
  ctx.fillStyle='#3d4470';ctx.font='11px DM Mono,monospace';
  ctx.fillText('Rewrite as exponential form and solve for the power',W/2,H*0.86);
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  const right=document.querySelector('.right');
  const bottom=document.getElementById('bottom');
  const instr=document.getElementById('instr');
  cv.width=right.clientWidth;
  cv.height=right.clientHeight-instr.offsetHeight-bottom.offsetHeight;
  setupCoords();
  draw();
}

window.addEventListener('resize',resize);
window.addEventListener('load',()=>{ setTimeout(()=>{ resize(); updateAll(); },60); });
</script>
