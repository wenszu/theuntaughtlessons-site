<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linear & Systems Grapher — IB Mathematics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #f5f7ff;
  --surf: #ffffff;
  --surf2: #f0f3ff;
  --surf3: #e8eeff;
  --border: #dce2f5;
  --navy: #1c2755;
  --blue: #3d6bff;
  --blue-l: #e6ebff;
  --red: #e5434b;
  --red-l: #fff0f0;
  --green: #1ab87a;
  --green-l: #e6fff4;
  --amber: #f59e0b;
  --amber-l: #fffbeb;
  --purple: #8b5cf6;
  --purple-l: #f5f0ff;
  --text: #1a2050;
  --text2: #4d5a8a;
  --text3: #9aa3c8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* HEADER */
header {
  background: var(--navy);
  height: 56px; display: flex; align-items: center;
  padding: 0 24px; gap: 14px;
  box-shadow: 0 2px 12px rgba(28,39,85,0.25);
}
.hlogo {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, #3d6bff, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: white;
}
header h1 { font-size: 16px; font-weight: 700; color: white; }
header p  { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }
.ibpill {
  margin-left: auto; padding: 4px 12px; border-radius: 20px;
  background: rgba(61,107,255,0.2); border: 1px solid rgba(61,107,255,0.4);
  color: #7fa4ff; font-size: 10px; font-weight: 700; letter-spacing: 1px;
}

/* TABS */
.tabbar {
  display: flex; background: var(--surf);
  border-bottom: 2px solid var(--border); padding: 0 20px;
}
.tab {
  padding: 11px 20px; font-size: 12px; font-weight: 700;
  color: var(--text3); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.15s; font-family: 'Outfit', sans-serif;
}
.tab.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab:hover:not(.active) { color: var(--text2); }

/* LAYOUT */
.app { display: flex; height: calc(100vh - 56px - 44px); }

/* LEFT */
.left {
  width: 286px; flex-shrink: 0;
  background: var(--surf); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 15px;
  display: flex; flex-direction: column; gap: 11px;
}
.card {
  background: var(--surf2); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px;
}
.card h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text3); margin-bottom: 11px;
}

/* Equation display */
.eq-display {
  border-radius: 9px; padding: 10px 13px; margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600;
  text-align: center;
}
.eq-display.line1 { background: var(--blue-l); color: var(--blue); border: 1px solid rgba(61,107,255,0.2); }
.eq-display.line2 { background: var(--red-l);  color: var(--red);  border: 1px solid rgba(229,67,75,0.2); }

/* Sliders */
.sg { margin-bottom: 10px; }
.sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.sl { font-size: 12px; font-weight: 600; color: var(--text2); }
.sv {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
  padding: 2px 9px; border-radius: 6px; min-width: 44px; text-align: right;
}
.sv.b { background: var(--blue-l); color: var(--blue); }
.sv.r { background: var(--red-l);  color: var(--red); }

input[type=range] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range].b::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--blue); cursor: pointer;
}
input[type=range].r::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--red); cursor: pointer;
}

/* Value rows */
.vrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.vl { font-size: 12px; font-weight: 600; color: var(--text2); }
.vc {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
  padding: 3px 10px; border-radius: 7px; min-width: 90px; text-align: right;
}
.vc.b { background: var(--blue-l); color: var(--blue); border: 1px solid rgba(61,107,255,0.15); }
.vc.r { background: var(--red-l);  color: var(--red);  border: 1px solid rgba(229,67,75,0.15); }
.vc.g { background: var(--green-l);color: var(--green); border: 1px solid rgba(26,184,122,0.15); }
.vc.a { background: var(--amber-l);color: var(--amber); border: 1px solid rgba(245,158,11,0.15); }
.vc.p { background: var(--purple-l);color: var(--purple);border: 1px solid rgba(139,92,246,0.15); }

/* Insight */
.ins {
  border-radius: 9px; padding: 9px 11px;
  font-size: 12px; font-weight: 500; line-height: 1.6;
  border-left: 3px solid; margin-top: 7px;
}
.ins.b { background: var(--blue-l); color: #2a4cbf; border-color: var(--blue); }
.ins.g { background: var(--green-l); color: #0e7a50; border-color: var(--green); }
.ins.r { background: var(--red-l); color: #b02020; border-color: var(--red); }
.ins.a { background: var(--amber-l); color: #92600a; border-color: var(--amber); }
.ins.p { background: var(--purple-l); color: #5b21b6; border-color: var(--purple); }

/* Step box */
.stepbox {
  background: var(--surf3); border-radius: 9px; padding: 11px 13px;
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: var(--text2); line-height: 1.9; margin-top: 6px;
}
.stepbox .hi { color: var(--text); font-weight: 600; }
.stepbox .blu { color: var(--blue); }
.stepbox .red { color: var(--red); }
.stepbox .grn { color: var(--green); }
.stepbox .amb { color: var(--amber); }

/* Preset grid */
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.pbtn {
  background: var(--surf3); border: 1px solid var(--border);
  color: var(--text2); font-family: 'Outfit', sans-serif;
  font-size: 11px; font-weight: 600; padding: 7px 5px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s; text-align: center;
}
.pbtn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-l); }

/* Practice */
.prob {
  background: var(--navy); border-radius: 10px; padding: 13px;
  text-align: center; margin-bottom: 11px;
}
.prob .pq { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.prob .pe { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: white; line-height: 1.6; }
.ainput {
  width: 100%; padding: 9px 13px; border-radius: 9px;
  border: 1.5px solid var(--border); background: var(--surf2);
  font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600;
  color: var(--text); outline: none; text-align: center; margin-bottom: 8px;
}
.ainput:focus { border-color: var(--blue); }
.fb { padding: 8px 12px; border-radius: 9px; font-size: 12px; font-weight: 600; text-align: center; display: none; margin-bottom: 8px; }
.fb.ok  { background: var(--green-l); color: var(--green); border: 1px solid rgba(26,184,122,0.3); display: block; }
.fb.err { background: var(--red-l);   color: var(--red);   border: 1px solid rgba(229,67,75,0.3);  display: block; }
.sc { display: flex; gap: 7px; margin-bottom: 11px; }
.sp { flex: 1; text-align: center; padding: 7px; border-radius: 9px; font-size: 13px; font-weight: 700; }
.sp.ok  { background: var(--green-l); color: var(--green); }
.sp.err { background: var(--red-l);   color: var(--red); }
.btn { display: block; width: 100%; padding: 10px; border-radius: 9px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.14s; margin-bottom: 7px; }
.btn-blue { background: var(--blue); color: white; }
.btn-blue:hover { background: #2d56e0; transform: translateY(-1px); }
.btn-out { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
.btn-out:hover { border-color: var(--blue); color: var(--blue); }

/* RIGHT */
.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.instr { background: var(--navy); padding: 7px 18px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); text-align: center; flex-shrink: 0; }
canvas { flex: 1; display: block; cursor: crosshair; }
.btm {
  background: var(--surf); border-top: 1px solid var(--border);
  display: grid; grid-template-columns: repeat(3,1fr); gap: 9px;
  padding: 11px 16px; flex-shrink: 0;
}
.bc { background: var(--surf2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.bt { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-bottom: 5px; }
.bv { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text2); line-height: 1.7; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="hlogo">∥</div>
  <div>
    <h1>Linear & Systems Grapher</h1>
    <p>Lines, Intersections & Systems of Equations · Grade 8 · IB Mathematics</p>
  </div>
  <div class="ibpill">IB PREP</div>
</header>

<div class="tabbar">
  <button class="tab active" onclick="setTab('single')">① One Line</button>
  <button class="tab" onclick="setTab('system')">② Two Lines (System)</button>
  <button class="tab" onclick="setTab('types')">③ System Types</button>
  <button class="tab" onclick="setTab('solve')">④ Substitution Method</button>
  <button class="tab" onclick="setTab('practice')">⑤ Practice</button>
</div>

<div class="app">
  <div class="left" id="left"></div>
  <div class="right">
    <div class="instr" id="instr"></div>
    <canvas id="cv"></canvas>
    <div class="btm" id="btm"></div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// State
let tab = 'single';
// Line 1: y = m1*x + b1
let m1 = 1, b1 = 0;
// Line 2: y = m2*x + b2
let m2 = -1, b2 = 4;
// Types mode
let sysType = 'consistent'; // consistent / inconsistent / dependent
// Practice
let prac = { correct:0, wrong:0, current:null, answered:false };

// ── helpers ──────────────────────────────────────────────────────────────────
function fmt(n, d=2){ const r=Math.round(n*100)/100; return Number.isInteger(r)?r.toString():r.toFixed(d); }
function fmtEq(m,b,color=''){
  let s='y = ';
  if(m===0) s+=fmt(b);
  else {
    s+=(m===1?'':(m===-1?'−':fmt(m)))+'x';
    if(b>0) s+=` + ${fmt(b)}`;
    else if(b<0) s+=` − ${fmt(Math.abs(b))}`;
  }
  return s;
}
function intersection(m1,b1,m2,b2){
  if(Math.abs(m1-m2)<0.0001) return null;
  const x=(b2-b1)/(m1-m2);
  const y=m1*x+b1;
  return {x,y};
}

// ── tab switch ────────────────────────────────────────────────────────────────
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['single','system','types','solve','practice'][i]===t);
  });
  if(t==='system'){ m1=1;b1=0;m2=-1;b2=4; }
  if(t==='types') sysType='consistent';
  updateAll();
}

// ── update ────────────────────────────────────────────────────────────────────
function updateAll(){ renderLeft(); renderBtm(); draw(); }

// ── rebind sliders ────────────────────────────────────────────────────────────
function bindSliders(){
  ['m1','b1','m2','b2'].forEach(id=>{
    const el=document.getElementById('sl-'+id);
    const vEl=document.getElementById('v-'+id);
    if(!el) return;
    el.oninput=function(){
      const v=parseFloat(this.value);
      if(id==='m1') m1=v;
      else if(id==='b1') b1=v;
      else if(id==='m2') m2=v;
      else b2=v;
      if(vEl) vEl.textContent=fmt(v);
      updateAll();
    };
  });
  const tp=document.getElementById('sys-type');
  if(tp) tp.onchange=function(){ sysType=this.value; applyType(); updateAll(); };
  const inp=document.getElementById('ans-inp');
  if(inp) inp.onkeydown=e=>{ if(e.key==='Enter') checkAns(); };
}

function applyType(){
  if(sysType==='consistent'){ m1=1;b1=0;m2=-1;b2=4; }
  else if(sysType==='inconsistent'){ m1=2;b1=1;m2=2;b2=-3; }
  else { m1=1;b1=2;m2=1;b2=2; } // dependent
}

// ── LEFT panels ───────────────────────────────────────────────────────────────
function renderLeft(){
  const L=document.getElementById('left');
  if(tab==='single')   L.innerHTML=leftSingle();
  else if(tab==='system') L.innerHTML=leftSystem();
  else if(tab==='types')  L.innerHTML=leftTypes();
  else if(tab==='solve')  L.innerHTML=leftSolve();
  else                    L.innerHTML=leftPractice();
  bindSliders();
}

function sliderBlock(id, label, min, max, step, val, cls){
  return `<div class="sg">
    <div class="sh"><span class="sl">${label}</span><span class="sv ${cls}" id="v-${id}">${fmt(val)}</span></div>
    <input type="range" class="${cls}" id="sl-${id}" min="${min}" max="${max}" step="${step}" value="${val}">
  </div>`;
}

function leftSingle(){
  const xint = m1!==0 ? -b1/m1 : null;
  return `
  <div class="card">
    <h3>Line Controls</h3>
    <div class="eq-display line1">${fmtEq(m1,b1)}</div>
    ${sliderBlock('m1','Slope (m)',-5,5,0.5,m1,'b')}
    ${sliderBlock('b1','y-intercept (b)',-8,8,0.5,b1,'b')}
  </div>
  <div class="card">
    <h3>Line Properties</h3>
    <div class="vrow"><span class="vl">Slope m</span><span class="vc b">${fmt(m1)}</span></div>
    <div class="vrow"><span class="vl">y-intercept</span><span class="vc b">(0, ${fmt(b1)})</span></div>
    <div class="vrow"><span class="vl">x-intercept</span><span class="vc b">${xint!==null?`(${fmt(xint)}, 0)`:'none (horiz.)'}</span></div>
    <div class="vrow"><span class="vl">Direction</span><span class="vc ${m1>0?'g':m1<0?'r':'a'}">${m1>0?'↗ rising':m1<0?'↘ falling':'→ horizontal'}</span></div>
  </div>
  <div class="card">
    <h3>What Slope Means</h3>
    <div class="ins b">Slope = rise ÷ run. For every 1 step right, the line goes <b>${fmt(m1)}</b> steps up${m1<0?' (negative = going down)':''}.</div>
    <div class="ins g" style="margin-top:7px">The y-intercept <b>(0, ${fmt(b1)})</b> is where the line crosses the y-axis — it's the starting value when x = 0.</div>
  </div>
  <div class="card">
    <h3>Presets</h3>
    <div class="pgrid">
      <button class="pbtn" onclick="m1=1;b1=0;updateAll()">slope = 1</button>
      <button class="pbtn" onclick="m1=2;b1=-3;updateAll()">slope = 2</button>
      <button class="pbtn" onclick="m1=-1;b1=4;updateAll()">neg. slope</button>
      <button class="pbtn" onclick="m1=0;b1=3;updateAll()">horizontal</button>
    </div>
  </div>`;
}

function leftSystem(){
  const pt=intersection(m1,b1,m2,b2);
  return `
  <div class="card">
    <h3>Line 1 (blue)</h3>
    <div class="eq-display line1">${fmtEq(m1,b1)}</div>
    ${sliderBlock('m1','Slope m₁',-5,5,0.5,m1,'b')}
    ${sliderBlock('b1','Intercept b₁',-8,8,0.5,b1,'b')}
  </div>
  <div class="card">
    <h3>Line 2 (red)</h3>
    <div class="eq-display line2">${fmtEq(m2,b2)}</div>
    ${sliderBlock('m2','Slope m₂',-5,5,0.5,m2,'r')}
    ${sliderBlock('b2','Intercept b₂',-8,8,0.5,b2,'r')}
  </div>
  <div class="card">
    <h3>Intersection Point</h3>
    ${pt
      ? `<div class="vrow"><span class="vl">Solution x</span><span class="vc g">${fmt(pt.x)}</span></div>
         <div class="vrow"><span class="vl">Solution y</span><span class="vc g">${fmt(pt.y)}</span></div>
         <div class="ins g">The solution (${fmt(pt.x)}, ${fmt(pt.y)}) satisfies both equations simultaneously.</div>`
      : `<div class="ins r">No intersection — the lines are parallel (same slope, different intercepts). No solution.</div>`
    }
  </div>`;
}

function leftTypes(){
  const typeOptions = `<select id="sys-type" style="width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surf3);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;outline:none;cursor:pointer;margin-bottom:10px">
    <option value="consistent" ${sysType==='consistent'?'selected':''}>Consistent — One solution</option>
    <option value="inconsistent" ${sysType==='inconsistent'?'selected':''}>Inconsistent — No solution</option>
    <option value="dependent" ${sysType==='dependent'?'selected':''}>Dependent — Infinite solutions</option>
  </select>`;

  let explanation='', insClass='b';
  if(sysType==='consistent'){
    explanation='The two lines have <b>different slopes</b> so they intersect at exactly one point. That point is the unique solution.';
    insClass='g';
  } else if(sysType==='inconsistent'){
    explanation='The two lines have the <b>same slope but different y-intercepts</b> — they are parallel and never meet. No solution exists.';
    insClass='r';
  } else {
    explanation='The two lines are <b>identical</b> — same slope, same intercept. Every point on the line is a solution. Infinitely many solutions.';
    insClass='a';
  }

  return `
  <div class="card">
    <h3>System Type</h3>
    ${typeOptions}
    <div class="eq-display line1">${fmtEq(m1,b1)}</div>
    <div class="eq-display line2" style="margin-top:6px">${fmtEq(m2,b2)}</div>
  </div>
  <div class="card">
    <h3>What's Happening</h3>
    <div class="vrow"><span class="vl">Slope 1</span><span class="vc b">${fmt(m1)}</span></div>
    <div class="vrow"><span class="vl">Slope 2</span><span class="vc r">${fmt(m2)}</span></div>
    <div class="vrow"><span class="vl">Same slope?</span><span class="vc ${Math.abs(m1-m2)<0.001?'r':'g'}">${Math.abs(m1-m2)<0.001?'Yes':'No'}</span></div>
    <div class="vrow"><span class="vl">Same intercept?</span><span class="vc ${(Math.abs(m1-m2)<0.001&&Math.abs(b1-b2)<0.001)?'g':'r'}">${(Math.abs(m1-m2)<0.001&&Math.abs(b1-b2)<0.001)?'Yes':'No'}</span></div>
    <div class="ins ${insClass}">${explanation}</div>
  </div>
  <div class="card">
    <h3>IB Key Rule</h3>
    <div class="ins p">In IB exams, always check slopes first. Same slope → either no solution or infinite solutions. Different slopes → exactly one solution.</div>
  </div>`;
}

function leftSolve(){
  const pt=intersection(m1,b1,m2,b2);
  const e1=fmtEq(m1,b1), e2=fmtEq(m2,b2);
  let steps='';
  if(pt){
    const xv=fmt(pt.x), yv=fmt(pt.y);
    steps=`
    <div class="stepbox">
      <span class="hi">System:</span><br>
      <span class="blu">y = ${fmt(m1)}x + ${fmt(b1)}</span>  ...(1)<br>
      <span class="red">y = ${fmt(m2)}x + ${fmt(b2)}</span>  ...(2)<br>
      <br>
      <span class="hi">Step 1: Set equal</span><br>
      Since both = y:<br>
      <span class="blu">${fmt(m1)}x + ${fmt(b1)}</span> = <span class="red">${fmt(m2)}x + ${fmt(b2)}</span><br>
      <br>
      <span class="hi">Step 2: Solve for x</span><br>
      ${fmt(m1)}x − ${fmt(m2)}x = ${fmt(b2)} − ${fmt(b1)}<br>
      ${fmt(m1-m2)}x = ${fmt(b2-b1)}<br>
      x = ${fmt(b2-b1)} ÷ ${fmt(m1-m2)}<br>
      <span class="grn">x = ${xv}</span><br>
      <br>
      <span class="hi">Step 3: Find y</span><br>
      y = ${fmt(m1)}(${xv}) + ${fmt(b1)}<br>
      <span class="grn">y = ${yv}</span><br>
      <br>
      <span class="hi">Solution: (${xv}, ${yv}) ✓</span>
    </div>`;
  } else {
    steps=`<div class="stepbox"><span class="hi">Same slope (${fmt(m1)}) → parallel lines → No solution.</span></div>`;
  }
  return `
  <div class="card">
    <h3>Line 1</h3>
    <div class="eq-display line1">${e1}</div>
    ${sliderBlock('m1','m₁',-5,5,0.5,m1,'b')}
    ${sliderBlock('b1','b₁',-8,8,0.5,b1,'b')}
  </div>
  <div class="card">
    <h3>Line 2</h3>
    <div class="eq-display line2">${e2}</div>
    ${sliderBlock('m2','m₂',-5,5,0.5,m2,'r')}
    ${sliderBlock('b2','b₂',-8,8,0.5,b2,'r')}
  </div>
  <div class="card">
    <h3>Step-by-Step Solution</h3>
    ${steps}
  </div>`;
}

// ── PRACTICE ──────────────────────────────────────────────────────────────────
const PROBS=[
  {q:'y = 2x + 1\ny = x + 3\nFind x:',  ans:2,  hint:'Set equal: 2x+1 = x+3 → x = 2'},
  {q:'y = 3x − 2\ny = x + 4\nFind x:',  ans:3,  hint:'Set equal: 3x−2 = x+4 → 2x=6 → x=3'},
  {q:'y = x + 5\ny = −x + 1\nFind x:', ans:-2, hint:'x+5 = −x+1 → 2x = −4 → x = −2'},
  {q:'y = 2x\ny = x + 4\nFind x:',     ans:4,  hint:'2x = x+4 → x = 4'},
  {q:'y = 4x − 3\ny = 2x + 1\nFind x:',ans:2, hint:'4x−3 = 2x+1 → 2x=4 → x=2'},
  {q:'y = −2x + 6\ny = x\nFind x:',    ans:2,  hint:'−2x+6 = x → 6 = 3x → x=2'},
  {q:'y = 3x + 1\ny = −x + 9\nFind x:',ans:2, hint:'3x+1 = −x+9 → 4x=8 → x=2'},
  {q:'y = x − 1\ny = 3x + 3\nFind x:', ans:-2, hint:'x−1 = 3x+3 → −2x=4 → x=−2'},
];

function newProb(){
  prac.current=PROBS[Math.floor(Math.random()*PROBS.length)];
  prac.answered=false;
  const inp=document.getElementById('ans-inp');
  const fb=document.getElementById('ans-fb');
  if(inp){inp.value='';inp.style.borderColor='';}
  if(fb){fb.className='fb';fb.textContent='';}
}

function checkAns(){
  if(prac.answered) return;
  const inp=document.getElementById('ans-inp');
  const fb=document.getElementById('ans-fb');
  if(!inp||!fb) return;
  const v=parseFloat(inp.value);
  if(isNaN(v)){fb.className='fb err';fb.textContent='Enter a number.';return;}
  const pr=prac.current;
  if(Math.abs(v-pr.ans)<0.05){
    prac.correct++;
    fb.className='fb ok';
    fb.textContent=`✓ Correct! x = ${pr.ans}. ${pr.hint}`;
    inp.style.borderColor='var(--green)';
  } else {
    prac.wrong++;
    fb.className='fb err';
    fb.textContent=`✗ Not quite. x = ${pr.ans}. ${pr.hint}`;
    inp.style.borderColor='var(--red)';
  }
  prac.answered=true;
  const sr=document.getElementById('sc-row');
  if(sr) sr.innerHTML=`<div class="sp ok">✓ ${prac.correct}</div><div class="sp err">✗ ${prac.wrong}</div>`;
}

function leftPractice(){
  if(!prac.current) newProb();
  const pr=prac.current;
  return `
  <div class="card"><h3>Score</h3>
    <div class="sc" id="sc-row">
      <div class="sp ok">✓ ${prac.correct}</div>
      <div class="sp err">✗ ${prac.wrong}</div>
    </div>
  </div>
  <div class="card"><h3>Solve the System</h3>
    <div class="prob">
      <div class="pq">Find the x value of the solution</div>
      <div class="pe">${pr.q.replace(/\n/g,'<br>')}</div>
    </div>
    <input class="ainput" id="ans-inp" type="number" step="0.5" placeholder="x = ?">
    <div class="fb" id="ans-fb"></div>
    <button class="btn btn-blue" onclick="checkAns()">Check Answer</button>
    <button class="btn btn-out" onclick="newProb();renderLeft()">Next Problem →</button>
  </div>
  <div class="card"><h3>Method Reminder</h3>
    <div class="stepbox">
      1. Set the two equations equal<br>
      2. Solve for x<br>
      3. Substitute x back in<br>
         to find y
    </div>
  </div>`;
}

// ── BOTTOM PANEL ──────────────────────────────────────────────────────────────
function renderBtm(){
  const B=document.getElementById('btm');
  const I=document.getElementById('instr');
  if(tab==='single'){
    I.textContent='Drag the slope and y-intercept sliders — watch how the line changes. Slope controls steepness, intercept moves it up or down.';
    B.innerHTML=`
      <div class="bc"><div class="bt">📐 Slope-Intercept Form</div><div class="bv">y = mx + b<br>m = slope (steepness)<br>b = y-intercept (start point)</div></div>
      <div class="bc"><div class="bt">📏 Reading Slope</div><div class="bv">Slope = rise / run<br>m = 2 means: up 2 for every 1 right<br>m = −1 means: down 1 for every 1 right</div></div>
      <div class="bc"><div class="bt">🎯 IB Tip</div><div class="bv">IB always uses y = mx + c (not b) for the intercept. Same idea, different letter. Don't be caught off guard!</div></div>`;
  } else if(tab==='system'){
    I.textContent='Adjust both lines with the sliders. The green dot shows where they intersect — that point satisfies both equations at the same time.';
    B.innerHTML=`
      <div class="bc"><div class="bt">🔵 Line 1 (blue)</div><div class="bv">${fmtEq(m1,b1)}</div></div>
      <div class="bc"><div class="bt">🔴 Line 2 (red)</div><div class="bv">${fmtEq(m2,b2)}</div></div>
      <div class="bc"><div class="bt">🟢 Intersection</div><div class="bv">${(()=>{const p=intersection(m1,b1,m2,b2);return p?`x = ${fmt(p.x)}, y = ${fmt(p.y)}\nSolution: (${fmt(p.x)}, ${fmt(p.y)})`:'No intersection (parallel lines)';})()}</div></div>`;
  } else if(tab==='types'){
    I.textContent='Switch between the three types of systems using the dropdown. See exactly what "consistent", "inconsistent", and "dependent" look like on a graph.';
    B.innerHTML=`
      <div class="bc"><div class="bt">✓ Consistent</div><div class="bv">Different slopes → lines cross → 1 solution. Most common in IB.</div></div>
      <div class="bc"><div class="bt">✗ Inconsistent</div><div class="bv">Same slope, different intercept → parallel → 0 solutions.</div></div>
      <div class="bc"><div class="bt">∞ Dependent</div><div class="bv">Identical lines → every point is a solution → infinitely many.</div></div>`;
  } else if(tab==='solve'){
    I.textContent='Change the lines and watch the full substitution method update step by step in real time. This is the method IB expects you to show working for.';
    B.innerHTML=`
      <div class="bc"><div class="bt">📝 Substitution Method</div><div class="bv">Since both equations equal y, set them equal to each other. Solve for x, then substitute back.</div></div>
      <div class="bc"><div class="bt">✏ Show All Working</div><div class="bv">IB awards method marks even if your arithmetic slips. Always write each step clearly.</div></div>
      <div class="bc"><div class="bt">✓ Check Your Answer</div><div class="bv">Substitute (x, y) back into BOTH equations to verify. IB often asks you to verify.</div></div>`;
  } else {
    I.textContent='Set the two equations equal and solve for x. Enter only the x value. Use the method reminder on the left.';
    B.innerHTML=`
      <div class="bc"><div class="bt">🔑 Key Step</div><div class="bv">Both equations equal y, so set them equal to each other and solve for x.</div></div>
      <div class="bc"><div class="bt">📌 After Finding x</div><div class="bv">Substitute x into either equation to find y. Both equations give the same y — that's how you know it's right.</div></div>
      <div class="bc"><div class="bt">🎯 IB Format</div><div class="bv">Always state the solution as a coordinate pair: "The solution is (x, y)."</div></div>`;
  }
}

// ── DRAWING ───────────────────────────────────────────────────────────────────
let W,H,OX,OY,SC;

function setup(){
  W=cv.width; H=cv.height;
  OX=W/2; OY=H/2;
  SC=Math.min(W,H)/14;
}
function tx(x){ return OX+x*SC; }
function ty(y){ return OY-y*SC; }
function fx(px){ return (px-OX)/SC; }
function fy(py){ return (OY-py)/SC; }

function drawGrid(){
  const x0=Math.floor(fx(0)),x1=Math.ceil(fx(W));
  const y0=Math.floor(fy(H)),y1=Math.ceil(fy(0));
  ctx.strokeStyle='#eaedfa'; ctx.lineWidth=1;
  for(let x=x0;x<=x1;x++){ctx.beginPath();ctx.moveTo(tx(x),0);ctx.lineTo(tx(x),H);ctx.stroke();}
  for(let y=y0;y<=y1;y++){ctx.beginPath();ctx.moveTo(0,ty(y));ctx.lineTo(W,ty(y));ctx.stroke();}
  ctx.strokeStyle='#c5ccee'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tx(0),0);ctx.lineTo(tx(0),H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,ty(0));ctx.lineTo(W,ty(0));ctx.stroke();
  // tick labels
  ctx.fillStyle='#c5ccee'; ctx.font='10px JetBrains Mono,monospace';
  ctx.textAlign='center';
  for(let x=x0;x<=x1;x++){if(x===0)continue;const px=tx(x);if(px<8||px>W-8)continue;ctx.fillText(x,px,ty(0)+14);}
  ctx.textAlign='right';
  for(let y=y0;y<=y1;y++){if(y===0)continue;const py=ty(y);if(py<8||py>H-8)continue;ctx.fillText(y,tx(0)-5,py+4);}
  ctx.fillStyle='#c5ccee'; ctx.textAlign='right'; ctx.fillText('0',tx(0)-5,ty(0)+14);
}

function plotLine(m,b,color,lw=2.5){
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash([]);
  ctx.beginPath();
  const x0=fx(0), x1=fx(W);
  ctx.moveTo(0, ty(m*x0+b));
  ctx.lineTo(W, ty(m*x1+b));
  ctx.stroke();
}

function dotPoint(x,y,color,label='',offset={x:10,y:-10}){
  const px=tx(x),py=ty(y);
  ctx.shadowColor=color; ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.shadowBlur=0;
  if(label){
    ctx.fillStyle=color;
    ctx.font='bold 12px Outfit,sans-serif';
    ctx.textAlign='left';
    ctx.fillText(label,px+offset.x,py+offset.y);
  }
}

function drawDash(x1c,y1c,x2c,y2c,color='#c5ccee'){
  ctx.strokeStyle=color; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(tx(x1c),ty(y1c));ctx.lineTo(tx(x2c),ty(y2c));ctx.stroke();
  ctx.setLineDash([]);
}

function draw(){
  setup();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f5f7ff';ctx.fillRect(0,0,W,H);
  drawGrid();
  if(tab==='single')   drawSingle();
  else if(tab==='system')   drawSystem();
  else if(tab==='types')    drawTypes();
  else if(tab==='solve')    drawSolve();
  else                      drawPractice();
}

function labelLine(m,b,color,lineLabel){
  // Find a nice x to put the label
  const lx=3, ly=m*lx+b;
  if(ty(ly)>20&&ty(ly)<H-20){
    ctx.fillStyle=color; ctx.font='bold 12px Outfit,sans-serif'; ctx.textAlign='left';
    ctx.fillText(lineLabel,tx(lx)+6,ty(ly)-8);
  }
}

function drawSingle(){
  // rise/run visual
  const rx=1, ry=m1;
  ctx.strokeStyle='rgba(61,107,255,0.2)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(tx(0),ty(b1));ctx.lineTo(tx(rx),ty(b1));ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx(rx),ty(b1));ctx.lineTo(tx(rx),ty(b1+ry));ctx.stroke();
  ctx.setLineDash([]);
  // labels
  ctx.fillStyle='rgba(61,107,255,0.5)';ctx.font='11px Outfit,sans-serif';ctx.textAlign='center';
  ctx.fillText('run=1',tx(0.5),ty(b1)+16);
  ctx.textAlign='left';
  ctx.fillText(`rise=${fmt(m1)}`,tx(rx)+5,(ty(b1)+ty(b1+ry))/2);

  plotLine(m1,b1,'#3d6bff');
  // y-intercept
  dotPoint(0,b1,'#3d6bff',`(0, ${fmt(b1)})`,{x:10,y:-10});
  // x-intercept
  if(m1!==0){
    const xi=-b1/m1;
    if(Math.abs(xi)<15) dotPoint(xi,0,'#8b5cf6',`(${fmt(xi)}, 0)`,{x:5,y:15});
  }
  labelLine(m1,b1,'#3d6bff',fmtEq(m1,b1));
}

function drawSystem(){
  plotLine(m1,b1,'#3d6bff');
  plotLine(m2,b2,'#e5434b');
  labelLine(m1,b1,'#3d6bff',fmtEq(m1,b1));
  labelLine(m2,b2,'#e5434b',fmtEq(m2,b2));
  const pt=intersection(m1,b1,m2,b2);
  if(pt&&Math.abs(pt.x)<20&&Math.abs(pt.y)<20){
    drawDash(pt.x,pt.y,pt.x,0,'rgba(26,184,122,0.4)');
    drawDash(pt.x,pt.y,0,pt.y,'rgba(26,184,122,0.4)');
    dotPoint(pt.x,pt.y,'#1ab87a',`Solution (${fmt(pt.x)}, ${fmt(pt.y)})`,{x:10,y:-12});
  }
}

function drawTypes(){
  if(sysType==='dependent'){
    // Draw one fat line to show they're identical
    plotLine(m1,b1,'rgba(61,107,255,0.3)',6);
    plotLine(m1,b1,'#8b5cf6',2.5);
    ctx.fillStyle='#8b5cf6';ctx.font='bold 12px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillText('Lines are identical — every point is a solution',W/2,H*0.15);
  } else if(sysType==='inconsistent'){
    plotLine(m1,b1,'#3d6bff');
    plotLine(m2,b2,'#e5434b');
    ctx.fillStyle='#e5434b';ctx.font='bold 12px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillText('Parallel lines — no intersection — no solution',W/2,H*0.15);
    // Arrow showing the gap
    ctx.strokeStyle='rgba(245,158,11,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(tx(0),ty(b1));ctx.lineTo(tx(0),ty(b2));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b';ctx.font='11px Outfit,sans-serif';ctx.textAlign='left';
    ctx.fillText('gap',tx(0)+5,(ty(b1)+ty(b2))/2);
  } else {
    plotLine(m1,b1,'#3d6bff');
    plotLine(m2,b2,'#e5434b');
    const pt=intersection(m1,b1,m2,b2);
    if(pt) dotPoint(pt.x,pt.y,'#1ab87a',`One solution (${fmt(pt.x)}, ${fmt(pt.y)})`,{x:10,y:-12});
  }
}

function drawSolve(){
  plotLine(m1,b1,'rgba(61,107,255,0.6)');
  plotLine(m2,b2,'rgba(229,67,75,0.6)');
  const pt=intersection(m1,b1,m2,b2);
  if(pt&&Math.abs(pt.x)<20&&Math.abs(pt.y)<20){
    drawDash(pt.x,pt.y,pt.x,0,'rgba(26,184,122,0.4)');
    drawDash(pt.x,pt.y,0,pt.y,'rgba(26,184,122,0.4)');
    dotPoint(pt.x,pt.y,'#1ab87a',`(${fmt(pt.x)}, ${fmt(pt.y)})`,{x:10,y:-12});
  }
  labelLine(m1,b1,'rgba(61,107,255,0.8)',fmtEq(m1,b1));
  labelLine(m2,b2,'rgba(229,67,75,0.8)',fmtEq(m2,b2));
}

function drawPractice(){
  if(!prac.current) return;
  ctx.fillStyle='#f5f7ff';ctx.fillRect(0,0,W,H);
  // Parse and draw the lines from the problem
  const pr=prac.current;
  const lines=pr.q.split('\n').slice(0,2);
  const parse=eq=>{
    // y = mx + b or y = mx
    const m=eq.match(/y\s*=\s*([−\-]?\d*\.?\d*)x\s*([+\-]\s*\d+\.?\d*)?/);
    if(!m) return {m:0,b:0};
    let slope=parseFloat(m[1].replace('−','-')||'1');
    if(m[1]===''||m[1]===undefined) slope=1;
    if(m[1]==='-'||m[1]==='−') slope=-1;
    let intercept=m[2]?parseFloat(m[2].replace(/\s/g,'').replace('−','-')):0;
    return {m:slope,b:intercept};
  };
  try{
    const l1=parse(lines[0]),l2=parse(lines[1]);
    plotLine(l1.m,l1.b,'rgba(61,107,255,0.5)');
    plotLine(l2.m,l2.b,'rgba(229,67,75,0.5)');
    const pt=intersection(l1.m,l1.b,l2.m,l2.b);
    if(pt&&Math.abs(pt.x)<20&&Math.abs(pt.y)<20){
      drawDash(pt.x,pt.y,pt.x,0,'rgba(26,184,122,0.3)');
      drawDash(pt.x,pt.y,0,pt.y,'rgba(26,184,122,0.3)');
      if(prac.answered) dotPoint(pt.x,pt.y,'#1ab87a',`Answer (${fmt(pt.x)}, ${fmt(pt.y)})`,{x:10,y:-12});
      else { // show point but not label
        ctx.beginPath();ctx.arc(tx(pt.x),ty(pt.y),7,0,Math.PI*2);
        ctx.fillStyle='rgba(26,184,122,0.3)';ctx.fill();
      }
    }
  }catch(e){}
  // Problem text overlay
  ctx.fillStyle='rgba(28,39,85,0.88)';
  ctx.beginPath();ctx.roundRect(W*0.55,H*0.08,W*0.4,H*0.28,12);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px Outfit,sans-serif';ctx.textAlign='center';
  ctx.fillText('SYSTEM',W*0.75,H*0.14);
  ctx.fillStyle='white';ctx.font='bold 13px JetBrains Mono,monospace';
  lines.slice(0,2).forEach((l,i)=> ctx.fillText(l,W*0.75,H*0.19+i*20));
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function resize(){
  const r=document.querySelector('.right');
  const btm=document.getElementById('btm');
  const instr=document.getElementById('instr');
  cv.width=r.clientWidth;
  cv.height=r.clientHeight-instr.offsetHeight-btm.offsetHeight;
  setup(); draw();
}

window.addEventListener('resize',resize);
window.addEventListener('load',()=>{ setTimeout(()=>{ resize(); updateAll(); },60); });
</script>
